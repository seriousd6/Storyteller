  * { box-sizing:border-box; }
  body { margin:0; height:100vh; display:flex; flex-direction:column; background:var(--bg);
         color:var(--ink); font:15px/1.55 Georgia, 'Times New Roman', serif; }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px; background:var(--panel);
           border-bottom:1px solid var(--line); font-family:system-ui, sans-serif; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; }
  header .sub { color:var(--dim); font-size:12px; }
  header .grow { flex:1; }
  header label { font-size:13px; display:flex; gap:6px; align-items:center; cursor:pointer; }
  button { background:#252c37; color:var(--ink); border:1px solid var(--line); border-radius:7px;
           padding:5px 11px; font:13px system-ui, sans-serif; cursor:pointer; }
  button:hover { background:#2c3542; }
  button.small { padding:2px 8px; font-size:12px; }
  button.ghosty { border-style:dashed; color:var(--dim); }
  main { flex:1; display:flex; min-height:0; }
  nav { width:270px; overflow:auto; background:var(--panel); border-right:1px solid var(--line);
        padding:10px 8px; font-family:system-ui, sans-serif; font-size:13.5px; display:flex; flex-direction:column; }
  nav .treewrap { flex:1; }
  nav .node { padding:2px 6px; border-radius:5px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  nav .node:hover { background:#252c37; }
  nav .node.active { background:#2c3542; color:var(--gold); }
  nav .kids { margin-left:14px; border-left:1px solid var(--line); padding-left:6px; }
  nav .dead { color:var(--dim); text-decoration:line-through; }
  nav .addroot { margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
  article { flex:1; overflow:auto; padding:26px 40px 90px; max-width:880px; }
  .crumbs { font-family:system-ui, sans-serif; font-size:12.5px; color:var(--dim); margin-bottom:6px; }
  .crumbs a { color:var(--dim); }
  .kindchip { font-family:system-ui, sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
              color:var(--gold); border:1px solid #55492c; border-radius:10px; padding:1px 9px; vertical-align:6px; margin-left:10px; }
  h2.title { font-size:30px; margin:2px 0 2px; color:var(--gold); font-weight:normal; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  h2.title input { font:inherit; color:inherit; background:#252c37; border:1px solid var(--line); border-radius:6px; padding:0 8px; max-width:60%; }
  .aliases { color:var(--dim); font-style:italic; margin-bottom:10px; }
  .tags span { font-family:system-ui,sans-serif; font-size:11px; background:#252c37; border-radius:9px; padding:1px 8px; margin-right:5px; color:var(--dim); }
  section { margin-top:22px; }
  section > h3 { font-family:system-ui, sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:.1em;
                 color:var(--dim); border-bottom:1px solid var(--line); padding-bottom:4px; display:flex; align-items:center; gap:10px; }
  section > h3 .sp { flex:1; }
  .frow { display:grid; grid-template-columns:230px 1fr; gap:4px 16px; align-items:start; margin:7px 0; }
  .frow .fl { color:var(--dim); font-family:system-ui,sans-serif; font-size:13px; padding-top:5px; }
  .frow input, .frow select, .frow textarea, .blockedit textarea {
    width:100%; font:14px/1.5 Georgia, serif; color:var(--ink); background:#20262f;
    border:1px solid var(--line); border-radius:6px; padding:5px 9px; }
  .frow textarea { min-height:56px; resize:vertical; }
  a { color:var(--link); text-decoration:none; border-bottom:1px dotted #4a6584; }
  a:hover { border-bottom-style:solid; }
  .block { margin:10px 0; position:relative; }
  .block .btools { position:absolute; right:0; top:-4px; display:none; gap:4px; }
  .block:hover .btools { display:flex; }
  .block .label { font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
  .block.secret { border-left:3px solid var(--secret); padding:6px 12px 6px 12px; background:#241c1c; border-radius:0 6px 6px 0; }
  .block.secret .label { color:var(--secret); }
  .blockedit textarea { min-height:90px; }
  .blockedit .rowtools { display:flex; gap:6px; margin-top:6px; align-items:center; font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); }
  .blockedit select { max-width:220px; background:#20262f; color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:3px 6px; font:12px system-ui,sans-serif; }
  .statb { border:1px solid #55492c; border-radius:6px; padding:10px 14px; background:#1e1a12; }
  .statb .sbname { color:var(--gold); font-variant:small-caps; font-size:18px; }
  ul.rel, ul.backs { padding-left:18px; margin:8px 0; }
  .ghostnote { font-family:system-ui,sans-serif; font-size:12.5px; color:var(--dim); font-style:italic; }
  .provenance { font-family:ui-monospace, monospace; font-size:11.5px; color:#6b7686; margin-top:26px;
                border-top:1px dashed var(--line); padding-top:8px; }
  canvas.floor { background:#101216; border:1px solid var(--line); border-radius:4px; margin:6px 10px 6px 0; }
  .floors { display:flex; flex-wrap:wrap; align-items:flex-start; }
  .floorbox { font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); }
  .conflict { font-family:system-ui,sans-serif; font-size:12.5px; color:#d8b46a; background:#242015;
              border:1px solid #55492c; border-radius:6px; padding:8px 12px; margin-top:10px; }
  .addkinds { display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
  .newform { display:flex; gap:8px; margin-top:10px; align-items:center; font-family:system-ui,sans-serif; }
  .newform input { flex:1; max-width:340px; font:14px Georgia,serif; color:var(--ink); background:#20262f; border:1px solid var(--line); border-radius:6px; padding:6px 9px; }
  .saved { color:var(--ok); font-family:system-ui,sans-serif; font-size:12px; opacity:0; transition:opacity .3s; }
  .saved.show { opacity:1; }
  .playerhide { display:none !important; }
  @media (max-width: 720px) {
    nav { width:170px; } article { padding:18px 16px 90px; }
    .frow { grid-template-columns:1fr; }
  }
</style>

                  "value": "Despondent."
                },
                {
                  "key": "Wants",
                  "value": "Assist a celestial being on a divine quest to save the world."
                },
                {
                  "key": "Flaw",
                  "value": "Prejudice — A Profession: specifically toward soldiers"
                },
                {
                  "key": "Quirk",
                  "value": "They love telling this story: Bork Bumblebeard - A foolhardy protagonist of dwarvern tales, who's funny legendary mishaps serve as a reminder to dwarf children to pay attention to detail. Sometimes makes an appearance in other dwarvern tales as a friendly foil to a hero or just as comic relief. Sometimes older storytellers may insert one of Bork's antics into their story no matter how improbable as a way of playing a practical joke on the listener, similar to a Rickroll!"
                },
                {
                  "key": "Faith",
                  "value": "Cautious listener."
                },
                {
                  "key": "Keepsake",
                  "value": "A jar of a purple liquid, stolen from the rain gods. It belonged to a man formally known as a prince."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "You weigh significantly less than usual for your race"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Trying to build a network of shady connections"
            }
          ],
          "id": "b_wjyerl26"
        }
      ],

    "e_sgwqh8oj6hubcy": {
      "id": "e_sgwqh8oj6hubcy",
      "kind": "building",
      "name": "The Religious Goods Shop",
      "fields": {
        "keeper": {
          "ref": "e_uokmrydv3og5u8"
        }
      },
      "body": [
        {
          "type": "statblock",
          "name": "The Religious Goods Shop",
          "meta": "Religious Goods merchant",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Premises",
              "text": "A Halfling Artificer and Tinker, with a broad smile and gregarious nature. He produces intricate, ingenious mechanical devices for adventurers. The shop he operates out of is built-to-halfling-scale, though. To broaden his customer base, he has fitted every shelf, display, and even the front wall of the building with a complex system of rails and slides, allowing him to do business with anyone, and display anything, all at the customer’s eye level."
            },
            {
              "type": "list",
              "label": "On the Shelves",
              "items": [
                "Staff of the Python (500gp) stock: Only 1, ever | DMG 204",
                "Spell: Raise dead (1,250gp) stock: 3 spells/day | PHB 270 Returns a dead corpse to life",
                "Dagger, ritual (2gp) stock: 2 | PHB 148 Has an oddly curved design",
                "Candle (1cp) stock: 1 | PHB 150 Comes in a variety of colors",
                "Chalk (1cp/piece) stock: 14 pieces | PHB 150 Comes in a variety of colors",
                "Keoghtom's ointment (250gp) stock: 3 | PHB 179"
              ]
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Keeper Personality",
                  "value": "I'm convinced my natural showmanship is what earns me customers."
                },
                {
                  "key": "Ideal",
                  "value": "Monopoly. Undercutting my rivals and price gouging are the only ways to get ahead. (Evil)"
                },
                {
                  "key": "Bond",
                  "value": "I'm counting down the days to a peaceful retirement with my spouse or loved ones."
                },
                {
                  "key": "Flaw",
                  "value": "It's hard for me to respect someone who doesn't know everything about what I'm selling."
                }
              ]
            }
          ],
          "id": "b_tsp11zu8"
        }
      ],

      "body": [

          "type": "statblock",

          "meta": "Human (male) · Barbarian",
          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Ears: Magically enhanced · Markings: More scars than skin — on the upper legs."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Angry When stressed: Cowardly"
                },
                {
                  "key": "Right Now",
                  "value": "Focused."
                },
                {
                  "key": "Wants",
                  "value": "Find a thrilling life."
                },
                {
                  "key": "Flaw",
                  "value": "Paces."
                },
                {
                  "key": "Quirk",
                  "value": "They love telling this story: Den'tal: A small humanoid that steals children's teeth. The story is told to those who refuse to eat the food served to them."
                },
                {
                  "key": "Faith",
                  "value": "Cautious listener."
                },
                {
                  "key": "Keepsake",
                  "value": "A wooden top that will keep spinning as long as someone is looking at it.Made to teach concentration to a young boy who had problems focusing on one thing at a time."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "A hood"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Can’t tell a lie, no matter the cost, religious."
            },
            {
              "type": "paragraph",
              "label": "If Asked About Home",
              "text": "Dunclaver – This old logging town is run by dwarves located on the edge of Growers Forest. The forest magically grows back every week what the loggers cut, no one knows how or why but if not cut back the forest slowly creeps into the town."
            }
          ],
          "id": "b_ybwadc3a"

          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Face: An unpleasant pustule · cut amethyst"
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Funny When stressed: Destructive"
                },
                {
                  "key": "Right Now",
                  "value": "Carefree."
                },
                {
                  "key": "Wants",
                  "value": "Embark on a pilgrimage to a sacred site for divine enlightenment."
                },
                {
                  "key": "Flaw",
                  "value": "Embellishes the truth."
                },
                {
                  "key": "Quirk",
                  "value": "They often say: “As romantic as a gelatinous cube.”"
                },
                {
                  "key": "Faith",
                  "value": "Casual observer."
                },
                {
                  "key": "Keepsake",
                  "value": "A rather large iron pot covered in scratches and scorch marks that can’t seem to be taken off. Meals prepared by this pot are always palatable but in need of salt, regardless of whether the recipe called for salt, the consumer’s enjoyment of salt, or amount of salt that was used in the cooking. Coincidentally, this effect can be nullified by adding copious amounts of pepper to the pot before serving the meal, in which case the food is always suprisingly delicious."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "something woven into a beard"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Charlatan: Built a fake dungeon, and then spread about it at inns and taverns, so they could ambush the adventurers who came to 'save the townsfolk' and take their stuff."

    "e_s5oh9z7uunjy01": {
      "id": "e_s5oh9z7uunjy01",
      "kind": "note",
      "name": "The feud on the square",
      "fields": {},
      "body": [
        {
          "type": "paragraph",
          "id": "b_283qxtxh",
          "text": "{@e e_o3cy312s62w7ju|The Animals Shop} and {@e e_sgwqh8oj6hubcy|The Religious Goods Shop} have not shared a civil word in years. {@e e_wglfninzb99rwy|Floriana} and {@e e_uokmrydv3og5u8|Oy Xiaong} each swear the other started it; {@e e_c7peu63ugg2bmw|Fendothek Gemzirgeno} and {@e e_xblfpc229gnvqw|Alupisys} take different sides at every family supper."
        }
      ],

      "kind": "person",
      "name": "Yorkas",
      "fields": {
        "vocation": "Hand behind the sickness"
      },
      "body": [
        {
          "type": "statblock",
          "name": "Yorkas",
          "meta": "Half-Elf (male) · Ranger",
          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Height: Unusually short · Jewelry: A pair of earrings with glowing moonstone orbs made of platinum."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Dour When stressed: Withdrawn"
                },
                {
                  "key": "Right Now",
                  "value": "Suspicious."
                },
                {
                  "key": "Wants",
                  "value": "Retrieve a legendary weapon to defend their homeland."
                },
                {
                  "key": "Flaw",
                  "value": "Prejudice — Racist: specifically toward halflings"
                },
                {
                  "key": "Quirk",
                  "value": "They often say: “The offspring of a dwarf and a hill giant.”"
                },
                {
                  "key": "Faith",
                  "value": "Broken heretic."
                },
                {
                  "key": "Keepsake",
                  "value": "A large conch shell that, when put to the ear, makes the wielder hear the sounds of the ocean. If you close your eyes while doing so, you’ ll see visions of infinite horizons and calming ocean waves. A gift from a pirate lord to his estranged, landlocked son to give him at least a glance as to why he left."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "The half-elf has a rather prominent underbite."
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Charlatan: Betting and losing a deed that wasn’t theirs to bet."
            }
          ],

        }

    "e_m2zon2fc39pebs": {
      "id": "e_m2zon2fc39pebs",
      "kind": "landmark",
      "name": "Tower Watch",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Tower Watch",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "A small pool of water at the roots of a gnarled old tree. The water contains a psychoactive substance which causes vivid, but not traumatic, dreams/hallucinations. Buried within the visions are directions to an abandoned bandit hideout nearby."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "The party finds an gold vein that has been roughly ‘mined out’. If they follow it, they find a hive of rust monsters eating the ore. If disturbed the RMs with spill out into the dungeon and eventually the surface (maybe destroying a nearby village)."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A stone bridge over a section of an otherwise normal river, the “water” under which is actually a grouping of gelatinous cubes in wait to surround any passers, running water hiding their already transparent bodies."
                },
                {
                  "key": "Scrawled Here",
                  "value": "On the ceiling, ‘Beware of Trappers’"
                }
              ]
            }
          ],
          "id": "b_2famflgk"
        }
      ],

      "body": [
        {
          "type": "statblock",
          "name": "Oldgate",
          "meta": "Town · pop. 1755",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Authoritarian Atmosphere: Concentrated power and limited civil liberties create an authoritarian atmosphere."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Gerontocracy — “The ruling power is held by a council of elderly individuals esteemed for their wisdom and experience.” The archetype of a gerontocracy is a form of government where the ruling power is vested in a council of elderly individuals who are considered to be the most experienced and wise members of society. In this system, decision-making and leadership positions are predominantly held by older adults based on their age and perceived wisdom. (Compare: No modern examples, mostly a tribalistic belief.) Leadership: Councillor Roland Ironheart - A skilled strategist and military commander, entrusted with safeguarding the realm. State goals: Maintaining Social Order - Upholding a structured society guided by the wisdom of experienced leaders. / Prioritizing Collective Well-being - Placing the welfare of the community above individual interests. Methods: Inter-Community Councils - Forming councils that represent diverse communities to promote inclusivity. / Council of Elders - Establishing a governing body of experienced individuals to make collective decisions. The citizenry wants: Nurturing Inclusivity and Diversity - Valuing and embracing the uniqueness of each member of society. Complication: Unaddressed Environmental Issues - Preservation of traditions might overshadow urgent environmental concerns."
                },
                {
                  "key": "Morale",
                  "value": "Fluctuating Morale: The people's morale varies due to external factors like economic conditions or political events."
                },
                {
                  "key": "Economy",
                  "value": "Stormborn Market: A seafaring economy where sailors and pirates trade in rare seashells, sea serpent scales, and treasures from sunken ships. Wealth: Progressive Taxation: A policy that imposes higher taxes on the wealthy to fund social programs and reduce income inequality. Taxes: Inheritance Tax: A tax on the value of assets transferred to heirs after a person's death, aiming to reduce wealth inequality. Treasury: Dependent: The country relies on external aid and support to sustain its financial needs."
                },
                {
                  "key": "Trade",
                  "value": "Enchanted Creatures: The country is known for capturing and exporting rare and magical creatures to collectors and wizards. Chief export: Elmheart Timber: Wood from ancient elms with magical properties, used in crafting items that enhance mental fortitude. Luxury trade: Banshee's Wail Chimes: Chimes crafted from silver imbued with the haunting sound of a banshee's wail, used in enchanting ceremonies."
                },
                {
                  "key": "Cuisine",
                  "value": "Troll's Repast: Rustic and substantial dishes prepared with hearty ingredients, echoing the troll's resilience."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Religious Persecution: The party encounters religious groups oppressed by the regime and must choose whether to intervene or remain neutral."
            }
          ],
          "id": "b_3uiu0fbq"
        }
      ],

    "e_x068r57v3i7db9": {
      "id": "e_x068r57v3i7db9",
      "kind": "settlement",

      },
      "body": [
        {
          "type": "statblock",
          "name": "Oldshore",
          "meta": "Town · pop. 1681",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Nationalistic Atmosphere: Strong nationalistic sentiments foster a patriotic and unified atmosphere."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Autocracy — “The single leader holds absolute and centralized power, not limited by any constitution, laws, or checks and balances.” In an autocratic government, a single individual, the autocrat or monarch, holds absolute and centralized power. Decisions are made without constraints or input from others, and political opposition is suppressed. Personal freedoms are limited, and the ruler often cultivates a personality cult. Information is tightly controlled, and dissent is met with repression. The ruler's authority is undisputed, creating a climate of fear and obedience among the populace. (Compare: United Arab Emirates (UAE), Singapore) Leadership: The Sorcerer-King: An enigmatic ruler who wields immense magical power, the Sorcerer-King's commands are backed by spells and sorcery. State goals: Establish a Cult of Personality: Some autocrats cultivate an image of themselves as larger-than-life figures, fostering a personality cult to enhance their authority and influence over the people. / Expand Territory: Some autocrats may have ambitions of territorial expansion, seeking to conquer neighboring lands and expand their empire's borders. Methods: Surveillance and Intelligence: Establish a network of spies and informants to monitor dissenters and potential threats. / Exploit External Threats: Use real or fabricated external threats to justify their actions and strengthen nationalism. The citizenry wants: Avoiding Surveillance: To stay off the radar of secret police or informants. Complication: Arbitrary Laws: The autocrat's whims dictate laws, leading to unpredictable and arbitrary judgments that the party may find unjust."
                },
                {
                  "key": "Morale",
                  "value": "Desperate Morale: Severe hardships and desperation lead to a sense of urgency for change."
                },
                {
                  "key": "Economy",
                  "value": "Merchant Caravan Trade: A nomadic economy driven by merchant caravans traversing the land, trading exotic goods, and uncovering hidden treasures. Wealth: Royal Patronage: A system where the monarch grants wealth and privileges to loyal subjects, resulting in a pyramid-like distribution of wealth. Taxes: Property Tax: A tax on the value of real estate, often used to fund local government services. Treasury: Struggling: The treasury is facing financial struggles, resulting in a lack of funds for vital services."
                },
                {
                  "key": "Trade",
                  "value": "Rare Woods: Known for its ancient forests, the country exports rare and enchanted woods used in fine craftsmanship. Chief export: Cerberus Collars: Collars worn by the three-headed Cerberus, used in controlling and summoning fierce hounds. Luxury trade: Kraken Pearl: A massive and iridescent pearl found in the depths of the ocean, used in crafting elegant and powerful jewelry."
                },
                {
                  "key": "Cuisine",
                  "value": "Magical Brews: Enchanted drinks and potions with magical effects, sold by alchemists and esteemed wizards."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Limited Safe Havens - Finding safe places to rest or plan is challenging with the puppet government everywhere."
            },
            {
              "type": "paragraph",
              "label": "Behind Closed Doors",
              "text": "Promoting Education: The government supports educational programs and exchanges to improve global knowledge."
            }
          ],
          "id": "b_a02h7x5z"
        }
      ],

    "e_ewcgkpmjzuymt3": {
      "id": "e_ewcgkpmjzuymt3",
      "kind": "settlement",
      "name": "Valley Gate",
      "fields": {

      "body": [
        {
          "type": "statblock",
          "name": "Valley Gate",
          "meta": "Town · pop. 1524",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Resilient Atmosphere: The country's ability to rebound from challenges and crises fosters a resilient atmosphere."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Meritocracy — “Rise to power through merit and ability, a society guided by the capable hands of its best.” The archetype of a meritocracy is a form of government where individuals are selected for positions of power and influence based on their abilities, talents, and qualifications. In a meritocracy, leadership positions are earned through merit and demonstrated competence rather than inherited or determined by factors like social class, wealth, or family background. The idea behind a meritocracy is that the most capable individuals rise to leadership positions, leading to efficient and effective governance. (Compare: None, some Companies, Academic institutions, and professional associations may use this.) Leadership: High Steward Roland Silverwood - In charge of the administrative affairs of the government, implementing policies to ensure transparency, accountability, and efficiency in the meritocratic system. State goals: Encourage Lifelong Health and Well-being - To prioritize public health and well-being, promoting healthy living and providing accessible healthcare services. / Maintain National Security - To ensure the safety and security of the nation, relying on strategic minds and skilled military leaders to defend against potential threats. Methods: Meritocracy Ambassador Program - Implementing a program where exceptional individuals represent the government internationally. / Talent Identification Initiatives - Launching initiatives to scout for hidden talents in underprivileged communities and provide them with opportunities. The citizenry wants: Social Mobility and Equal Opportunities - To advocate for a society that allows individuals to rise based on their abilities and efforts, regardless of their background or social status. Complication: Bureaucratic Hurdles - The meritocratic system's rigorous bureaucracy could delay the party's actions as they must navigate complex procedures."
                },
                {
                  "key": "Morale",
                  "value": "High Morale: The people are optimistic, content, and have a positive outlook on life and their country's future."
                },
                {
                  "key": "Economy",
                  "value": "Arcane Market Economy: A bustling economic system where enchanted items and magical artifacts are privately owned and traded, influenced by the forces of magic and demand. Wealth: Slavery-Based Economy: A morally questionable system where wealth is built on the exploitation of enslaved individuals, leading to extreme inequality. Taxes: Property Tax: A tax on the value of real estate, often used to fund local government services. Treasury: Depleted: The treasury has been considerably drained, requiring austerity measures and resource management."
                },
                {
                  "key": "Trade",
                  "value": "Rare Herbs and Plants: Renowned for its diverse flora, the country exports rare herbs and plants used in potions and remedies. Chief export: Centaur Hooves: Hooves of centaurs, used in creating potions that grant speed and enhanced mobility. Luxury trade: Sylph Silk Veils: Translucent and delicate silk woven by sylphs, used in creating beautiful veils and scarves."
                },
                {
                  "key": "Cuisine",
                  "value": "Satyr's Revelry: Festive and lively recipes that celebrate the joy and merriment of the satyr gatherings."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Restricted Access to Resources: The party may encounter difficulties in obtaining supplies, as certain goods might be tightly controlled or rationed by the government."
            },
            {
              "type": "paragraph",
              "label": "Behind Closed Doors",
              "text": "Conspiracy Theories: The country's government fosters or manipulates conspiracy theories to distract from real issues."
            }

    "e_b4jkv9v5mo70hw": {
      "id": "e_b4jkv9v5mo70hw",

      "body": [
        {
          "type": "statblock",
          "name": "Fordhaven",
          "meta": "Town · pop. 3908",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Stable Atmosphere: The government's effective policies and strong leadership create a sense of stability and calm among the populace."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Kleptocracy — “Self-enrichment through corruption and embezzlement, putting personal interests above the welfare of the people.” The archetype of a kleptocracy is a form of government where corruption and embezzlement are rampant, and those in power use their authority to exploit and steal public resources and wealth for personal gain. In a kleptocracy, leaders prioritize enriching themselves and their cronies, often at the expense of the well-being of the citizens they are supposed to serve. The result is a system marked by widespread corruption, economic inequality, and a disregard for the rule of law. (Compare: Russia, Equatorial Guinea, Venezuela, Angola, Democratic Republic of the Congo) Leadership: Chief of Presidential Staff Mikhail Vasiliev - The president's right-hand man, coordinating corrupt activities and ensuring loyalty within the government. State goals: Resource Exploitation - Exploiting the nation's resources for personal gain, disregarding environmental consequences. / Secrecy and Lack of Transparency - Operating in secrecy to avoid public scrutiny and accountability. Methods: Political Patronage - Rewarding loyal supporters with lucrative positions or contracts. / Debt Mismanagement - Incurring unsustainable debt while enriching the elite through inflated contracts. The citizenry wants: Supporting Civil Protests - Citizens participate in peaceful protests to demand change and reform. Complication: High Corruption Levels - Bribery, graft, and embezzlement make it difficult to trust officials or institutions."
                },
                {
                  "key": "Morale",
                  "value": "United Morale: Despite differences, the nation stands united in times of crisis or national pride."
                },
                {
                  "key": "Economy",
                  "value": "Elven Trade Alliance: A network of elven cities and settlements engaging in a fair and prosperous trade of rare woods, enchanted crafts, and ancient eldritch knowledge. Wealth: Technological Innovation: A society where technological advancements influence wealth distribution, benefiting those with access to advanced technologies. Taxes: Income Tax: Imposing a percentage tax on the income of individuals and businesses, with varying rates based on their wealth and earnings. Treasury: Resourceful: Despite limited resources, the government employs creative solutions to manage the treasury effectively."
                },
                {
                  "key": "Trade",
                  "value": "Sylvan Tinctures: Known for its lush forests, the country produces and exports elixirs with natural healing properties. Chief export: Chimera Oak Timber: Wood from the Chimera Oak trees found near the lairs of chimeras, used in crafting items with versatile properties. Luxury trade: Werewolf Claw Talismans: Talismans made from werewolf claws, used in protection and to ward off evil spirits."
                },
                {
                  "key": "Cuisine",
                  "value": "Wisp's Glow: Ethereal and luminescent desserts infused with glowing wisp essence, an enchanting treat."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Foreign Interference - Foreign powers may exploit the kleptocracy for their own benefit."
            }
          ],
          "id": "b_5r0d7wuv"

              "type": "keyValue",
              "pairs": [

                  "key": "Government",
                  "value": "Matriarchy — “Women hold primary positions of power and authority, often leading families, clans, or the entire society.” In a matriarchy, women play a central and dominant role in the social, political, and economic structures of society. They hold primary positions of power and authority, often leading families, clans, tribes, or even the entire civilization. In this system, women are typically the heads of households and hold key decision-making roles in matters of governance, law, and justice. (Compare: Amazons, Wakanda, Minangkabau of Indonesia, the Drow.) Leadership: High Enchantress Althea of the Arcane Order - Head of the mystical scholars, safeguarding ancient knowledge. State goals: Striving for Prosperity - Working towards economic growth and prosperity for their community. / Preserving Peace and Security - Striving for a safe and secure environment for all citizens. Methods: Gender Quotas in Politics - Introduce quotas to ensure adequate representation of women in political bodies. / Social Welfare Programs - Create safety nets and support systems to address the needs of vulnerable groups. The citizenry wants: Empowerment through Arts and Culture - Participate in and support the arts and cultural expressions that empower and inspire. Complication: Lack of Male Role Models - The party may find male characters lacking in certain professions or roles."

                  "value": "Free Market Economy: An economic system where most goods and services are privately owned and determined by supply and demand with limited government intervention. Wealth: Magic Trade Hierarchies: A system where powerful spellcasters control the magical trade, accumulating significant wealth through spell services and artifacts. Taxes: Pollution Tax: Levies on companies for pollution and environmental damage, encouraging eco-friendly practices. Treasury: Drained: The treasury has been heavily depleted, struggling to meet even essential expenses."

    "e_tk3oa19pw1c6z7": {
      "id": "e_tk3oa19pw1c6z7",
      "kind": "settlement",
      "name": "Orchard Hollow",
      "fields": {
        "population": 164
      },
      "body": [
        {
          "type": "statblock",
          "name": "Orchard Hollow",
          "meta": "Town · pop. 1697",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Inspiring Atmosphere: Government initiatives and national achievements inspire pride and motivation among citizens."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Aristocracy — “A privileged ruling class holds power, based on hereditary status and ancestry.” The archetype of an aristocratic government is a system of governance where power and authority are concentrated in the hands of a privileged ruling class, typically composed of noble families or hereditary elites. In an aristocracy, social status, and political influence are primarily determined by birthright, with individuals inheriting their positions of power from their ancestors. The ruling nobility holds significant control over the state's affairs, including decision-making, law-making, and resource allocation, often enjoying privileges and exemptions not available to the common people. (Compare: Partiall the UK, Japan, and Sweden) Leadership: Viscount Victor Nightshade: A mysterious and shrewd aristocrat, skilled in the realm of shadows and intrigue. State goals: Preservation of Traditions: Preserve and uphold the noble traditions and customs of their ancient lineage. / Expansion and Influence: Expand their territory and influence through strategic alliances and conquests. Methods: Building Alliances: Form alliances with powerful factions and influential figures to strengthen their position in the realm. / Public Relations: Engage in public relations and propaganda efforts to shape the perception of the aristocracy and maintain a positive image. The citizenry wants: Civic Responsibility: To fulfill civic responsibilities and duties expected of citizens under the aristocracy. Complication: Restrictions on Magic: The aristocracy might fear or regulate magic, imposing restrictions on spellcasters within their domain."
                },
                {
                  "key": "Morale",
                  "value": "High Morale: The people are optimistic, content, and have a positive outlook on life and their country's future."
                },
                {
                  "key": "Economy",
                  "value": "Capitalist Economy: An economic system based on private ownership of the means of production, with profits being the primary driving force. Wealth: Caste System: A rigid social structure where individuals are born into specific classes, each having distinct levels of wealth and opportunities. Taxes: Enchanted Trade Tariffs: Taxes imposed on magical goods and artifacts traded between different mystical realms. Treasury: Overflowing: The treasury is brimming with riches, and the nation enjoys a period of prosperity and wealth."
                },
                {
                  "key": "Trade",
                  "value": "Giant's Forged Weapons: The country's blacksmiths forge mighty weapons crafted from the remnants of ancient giants. Chief export: Unicorn Horns: Horns from unicorns, known for their healing properties and used in the creation of potent healing potions and wands. Luxury trade: Medicinal Herbs: Healing herbs and plants known for their medicinal properties and used by healers and apothecaries."
                },
                {
                  "key": "Cuisine",
                  "value": "Giant's Bounty: Abundant and hearty meals consisting of giant-sized portions, reflecting the mighty appetites of giants."
                }
              ]

      "body": [
        {
          "type": "statblock",
          "name": "Monasteryfield",
          "meta": "Town · pop. 887",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Economic Anxiety Atmosphere: Economic uncertainties and income disparities create an atmosphere of economic anxiety."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Gerontocracy — “The ruling power is held by a council of elderly individuals esteemed for their wisdom and experience.” The archetype of a gerontocracy is a form of government where the ruling power is vested in a council of elderly individuals who are considered to be the most experienced and wise members of society. In this system, decision-making and leadership positions are predominantly held by older adults based on their age and perceived wisdom. (Compare: No modern examples, mostly a tribalistic belief.) Leadership: Chief Gideon Strongheart - The esteemed leader of the council, renowned for his strength and courage in times of crisis. State goals: Resolving Conflicts Peacefully - Employing diplomacy and dialogue to resolve disputes within the council. / Safeguarding Tradition - Preserving the wisdom of past generations and upholding time-honored customs. Methods: Educational Outreach - Providing opportunities for lifelong learning and educational programs for citizens. / Inter-Community Councils - Forming councils that represent diverse communities to promote inclusivity. The citizenry wants: Advocating for Intergenerational Understanding - Encouraging open dialogue and cooperation between generations. Complication: Potential Corruption - Concentration of power among the elderly could lead to potential abuse."
                },
                {
                  "key": "Morale",
                  "value": "United Morale: Despite differences, the nation stands united in times of crisis or national pride."
                },
                {
                  "key": "Economy",
                  "value": "Mystic Auction House: An enigmatic economy held within hidden auction houses, trading unique relics, enchanted paintings, and mysterious artifacts. Wealth: Mercantile Oligarchy: An economic structure dominated by merchant families, leading to a concentration of wealth and commercial power. Taxes: Financial Transaction Tax: A tax on financial market transactions, including stock trades and derivatives. Treasury: Depleted: The treasury has been considerably drained, requiring austerity measures and resource management."
                },
                {
                  "key": "Trade",
                  "value": "Arcane Crystals: The country mines and exports powerful arcane crystals used in magical experiments and rituals. Chief export: Starfall Crystals: Crystals imbued with the power of fallen stars, used for divination and celestial magic. Luxury trade: Fishing Bounty: A variety of fresh and delectable seafood caught from the country's coastal waters."
                },
                {
                  "key": "Cuisine",
                  "value": "Kraken's Catch: Seafood galore sourced from the deepest ocean, reminiscent of the legendary kraken's domain."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Forced Labor and Slavery: The party may come across forced labor camps or enslaved populations suffering under the ruler's rule, prompting moral dilemmas and potential quests for liberation."
            }
          ],
          "id": "b_hk101sbg"
        }

            {
              "type": "paragraph",
              "label": "If Asked About Home",
              "text": "Wading Helm – miles out to sea, the top of a titanic humanoid’s head just barely peaks above the waves. Clad in armor, the decomposed remains of this ancient being continue to move, as it walks a somewhat elliptical path across the southern seabed. Wading Helm is a shantytown built atop it, made from imported stones and wood. Tethered boats are dragged behind the titan’s head like hair drifting in the water. Fishing is plentiful, as the movement of the colossus drives up vast clouds of nutrient-rich particles from the seafloor and brings schools of fish. Whaling nets them bone for scrimshawing and other artistic purposes. Wading Helm exports a variety of exotic waxes, soaps, and oils, made by mixing seafloor particulate with tallow and some other secret ingredients. Of course, they also trade away more conventional fish and marine mammal byproducts. Most of its population is away on trading fleets, which may take months to reach their destinations. Due to the shifting location of their homeland, Wadehelmers have honed the ability to read the sky and waves to know where they are."
            }

      },
      "body": [
        {
          "type": "statblock",
          "name": "Petsariph",
          "meta": "Half-Elf (male) · Summoner",
          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Hands: Burned · Jewelry: An ornate belt buckle with ancient runes made of brass."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Assertive When stressed: Compulsive"
                },
                {
                  "key": "Right Now",
                  "value": "Indifferent."
                },
                {
                  "key": "Wants",
                  "value": "Be amused."
                },
                {
                  "key": "Flaw",
                  "value": "Can’t resist flirting."
                },
                {
                  "key": "Quirk",
                  "value": "You chew with your mouth open."
                },
                {
                  "key": "Faith",
                  "value": "Outspoken cynic."
                },
                {
                  "key": "Keepsake",
                  "value": "A bag of apples, that never seem to go bad. You feel slightly bad after eating one, and that feeling intensifies after each apple. Also, everytime you take a bite, the bag seems to twist in on itself."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "Bushy Eyebrows"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Charlatan: Persuaded several friends to bankroll them for a surefire gambling scheme, based on a plan to use advanced math to calculate the 'true' odds of any particular play. Lost everything when they got too drunk to properly carry the '1'."
            },
            {
              "type": "paragraph",
              "label": "If Asked About Home",
              "text": "Pollokshields"
            }
          ],
          "id": "b_bk6jukmw"
        }

    "e_9xezfqs6zxqakg": {
      "id": "e_9xezfqs6zxqakg",
      "kind": "landmark",
      "name": "Agate Ascent",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Agate Ascent",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "A half-mile wide floating glacier; a shallow ice cave on the south face holds the remains of a failed exploration party. Among their gear is a tube which, uncapped, produces continual light."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "An archway has been heavily barricaded and the area around it has sign postings in the language of the dungeon’s inhabitants with stern warning to stay away. Skittering can be heard from within. Inside is a wing of the dungeon containing a burrow having broken through the wall and an infestation of subterranean creatures of the DM’s choice. (Possibly of a high CR to make this optional wing and its loot a real challenge to the PCs)"
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A pit trap opens up beneath a character. At the bottom of the bit they are falling into is a button that drops a stone block on top of them, covering the hole and smashing the character."
                },
                {
                  "key": "Scrawled Here",
                  "value": "68 tally marks scratched with incredible neatness. The last one looks very fresh and is shorter than the others…"
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "The Truth of It",
              "text": "The Greater Good: The PCs discover that the Villain does what they do for ostensibly 'good' reasons"
            }
          ],
          "id": "b_2ko33dsd"
        }
      ],

      "body": [
        {
          "type": "statblock",
          "name": "Melisande",
          "meta": "Human (female) · Barbarian",
          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Chin: A well-defined jawline · sapphires"
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Artistic When stressed: Caustic"
                },
                {
                  "key": "Right Now",
                  "value": "Tired."
                },
                {
                  "key": "Wants",
                  "value": "Lead a rebellion against a ruthless and power-hungry sorcerer."
                },
                {
                  "key": "Flaw",
                  "value": "Prejudice — Sexist: specifically toward females"
                },
                {
                  "key": "Quirk",
                  "value": "Favorite phrase: “That’s rough. [hands you a fresh peach] Maybe this’ll help.”"
                },
                {
                  "key": "Faith",
                  "value": "Broken heretic."
                },
                {
                  "key": "Keepsake",
                  "value": "A key made of glass."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "A walking stick"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Is searching for the knowledge of true immortality"
            },
            {
              "type": "paragraph",
              "label": "If Asked About Home",
              "text": "Lobersmuth – A town built by criminals for criminals, it sits on the edge of a swamp. No building has a name on the outside, and the streets are deliberately labyrinthine. Any who look lost or ask for directions are immediately marked as outsiders and potential targets."
            }
          ],

        }

    "e_1yv0k0fzreaa45": {
      "id": "e_1yv0k0fzreaa45",
      "kind": "landmark",
      "name": "Frostfield",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Frostfield",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "The Secret Monastery – Built in order to protect the world’s greatest secret. In fact, contains a well-guarded parchment that reads, “Alice has a crush on bob”. Not even the monks know whether this is all an elaborate prank, or whether it’s a distraction from the true secret, which remains hidden somewhere inside the temple."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "Three nothics sit, pouring over old tomes and scrolls, lit by blue crystals scattered on a pedestal. On the wall, a giant, engraved flaming eye is engraved. Staring at the carving of the eye for any significant length of time (DM’s discretion, but at least a few minutes) grants advantage on wisdom checks until the player’s next long rest. The player feels compelled to be unable to rest for the next two days, and is exhausted on the third day."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A long maze of gooey yellow sponge passages just large enough for one person to crawl through. The maze starts to shrink and harden if players take too long to get through."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘[Cheif’s right hand lackeys name] is [impotent/illiterate/part-human/vegetarian/a bookworm/short-sighted/other dire embarrasing trait for one of their species or job] ‘ this is a horrible rumour around the dungeon which (s)he has worked hard to stamp out and is now largely forgotton or at least unspoken. It is also 100% true. Make sure you introduce them by name when the PCs meet them!"
                }
              ]
            }
          ],
          "id": "b_yj28n4pt"
        }
      ],

      "id": "e_2yed4flkoddlfi",
      "kind": "settlement",

      },
      "body": [
        {
          "type": "statblock",
          "name": "Bridge Reach",
          "meta": "Town · pop. 1887",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Tense Atmosphere: Political conflicts and disagreements contribute to a tense and uneasy environment in the country."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Communalism — “A collective and participatory governance emphasizing cooperation, equality, and shared responsibility for the well-being of all members of society.” The archetype of a communalism government type is a form of collective governance where the community as a whole holds ownership, decision-making power, and responsibility for resources, production, and social welfare. In a communalism system, individual interests are subordinated to the greater good of the community, and decisions are made through participatory and consensus-based processes. The focus is on fostering cooperation, equality, and shared responsibility for the well-being of all members of society. This type of government emphasizes sustainability, self-sufficiency, and equitable distribution of resources, aiming to create a society built on mutual aid and solidarity. (Compare: This is usually restricted to smaller groups than national governments. No modern comparison.) Leadership: Craft Guild Master: Guides and trains artisans, preserving traditional craftsmanship. State goals: Universal Healthcare: Guarantee access to quality healthcare for every member, prioritizing their health and well-being. / Community-Based Sustainability: Promote self-sufficiency and self-reliance, reducing dependency on external resources. Methods: Local Governance: Encourage decentralized governance with autonomous decision-making at the local level. / Local Governance: Encourage decentralized governance with autonomous decision-making at the local level. The citizenry wants: Self-Sufficiency: To strive for self-sufficiency and reduce dependency on external resources. Complication: Environmental Guardianship: The party must adhere to strict environmental rules and face consequences for any actions that harm nature."
                },
                {
                  "key": "Morale",
                  "value": "Euphoric Morale: The nation experiences a collective state of joy and euphoria, often after significant accomplishments."
                },
                {
                  "key": "Economy",
                  "value": "Subsistence Economy: A self-sufficient system where people produce enough to meet their basic needs without surplus for trade. Wealth: Progressive Taxation: A policy that imposes higher taxes on the wealthy to fund social programs and reduce income inequality. Taxes: Gemstone Royalty: A tax imposed on precious gemstones and crystals mined from enchanted caves and mines. Treasury: Sufficient: The treasury holds a satisfactory amount of funds, meeting the basic needs of the country."
                },
                {
                  "key": "Trade",
                  "value": "Rare Herbs and Plants: Renowned for its diverse flora, the country exports rare herbs and plants used in potions and remedies. Chief export: Moonwater: Water collected from enchanted moonlit lakes, known for its healing properties. Luxury trade: Extravagant Clothing: Lavish and opulent clothing made from the finest fabrics, worn by the nobility."
                },
                {
                  "key": "Cuisine",
                  "value": "Siren's Serenade: Exquisite and melodious dishes that captivate the senses and evoke a sense of enchantment."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Public Opinion Swings: The party must adapt to changes in public opinion, which can influence government policies and decisions."
            }
          ],
          "id": "b_e2j6gyc8"
        }

              "pairs": [

                  "key": "Government",
                  "value": "Meritocracy — “Rise to power through merit and ability, a society guided by the capable hands of its best.” The archetype of a meritocracy is a form of government where individuals are selected for positions of power and influence based on their abilities, talents, and qualifications. In a meritocracy, leadership positions are earned through merit and demonstrated competence rather than inherited or determined by factors like social class, wealth, or family background. The idea behind a meritocracy is that the most capable individuals rise to leadership positions, leading to efficient and effective governance. (Compare: None, some Companies, Academic institutions, and professional associations may use this.) Leadership: Chief Strategist Alistair Emberforge - An expert in military tactics and strategic planning, responsible for ensuring the nation's defense and security based on merit-driven leadership. State goals: Nurture Talent and Potential - To identify and support talented individuals across various domains, providing them with the necessary resources and opportunities to reach their full potential. / Nurture Talent and Potential - To identify and support talented individuals across various domains, providing them with the necessary resources and opportunities to reach their full potential. Methods: Continuous Evaluation - Implementing ongoing evaluations to track citizens' progress and adjust opportunities accordingly. / Skill Development Workshops - Conducting skill development workshops and training programs to enhance citizens' abilities and expertise. The citizenry wants: Research and Innovation Funding - To promote government investment in research and development, encouraging advancements in science, technology, and other fields. Complication: Talented but Corrupt - Talented individuals with questionable ethics might use their skills to manipulate or exploit the system."

                  "key": "Morale",
                  "value": "Apathetic Morale: Citizens show little interest in political issues and are disengaged from the nation's well-being."

                {
                  "key": "Economy",
                  "value": "Beastfolk Subsistence Economy: A self-sufficient system where various beastfolk tribes and communities live off the land, hunting, farming, and foraging. Wealth: Nomadic Bartering: A roaming lifestyle where different nomadic groups exchange goods, creating fluid and dynamic wealth distribution. Taxes: Toll Booths: Placing toll booths at strategic locations, such as bridges, roads, and magical portals, to collect taxes from travelers and traders. Treasury: Drained: The treasury has been heavily depleted, struggling to meet even essential expenses."

                  "value": "Stormglass Orbs: Known for its stormy weather, the country exports glass orbs that capture and control lightning. Chief export: Cerberus Collars: Collars worn by the three-headed Cerberus, used in controlling and summoning fierce hounds. Luxury trade: Cotton and Linen: Soft and comfortable cotton and linen fabrics used in clothing and household items."
                },
                {

              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Satrapy — “A decentralized system where central authority appoints regional rulers to govern various territories.” A satrapy government is a form of governance in which a powerful central authority, typically an empire or kingdom, delegates administrative and political control over regions or provinces to subordinate rulers known as satraps. The satraps act as vassals or governors, overseeing local affairs while remaining loyal to the central authority. Satrapies are often established to maintain stability and manage vast territories, enabling the central government to exert control over distant lands through appointed representatives. However, this system can lead to issues of corruption, conflicting loyalties, and power struggles between the central authority and the satraps, making it a complex and delicate political arrangement. (Compare: More common in ancient governments like the Achemenid Empire of Persia) Leadership: Satrap Artemisia of Halicarnassus, Protector of the Coastal Province State goals: Cultural Assimilation of Conquered Territories: The satrapy seeks to assimilate the cultures of conquered regions into its own. / Establishing Diplomatic Alliances: Forging diplomatic alliances with other powers can enhance the satrapy's standing in the world. Methods: Surveillance and Monitoring: The government closely monitors its citizens and opponents to quash potential threats. / Rewriting History: Manipulating historical narratives to justify the satrapy's rule and legitimize its authority. The citizenry wants: Healthcare Access: Access to quality healthcare services is a significant concern for citizens' well-being. Complication: Limited Resources: The party struggles to secure essential resources as the government controls access to vital supplies."
                },
                {
                  "key": "Morale",
                  "value": "Empowered Morale: The populace feels empowered and actively participates in shaping the nation's direction."
                },
                {
                  "key": "Economy",
                  "value": "Merchant Caravan Trade: A nomadic economy driven by merchant caravans traversing the land, trading exotic goods, and uncovering hidden treasures. Wealth: Free Market Capitalism: An economic policy promoting minimal government intervention, leading to varying wealth distribution based on individual success. Taxes: Tourism Tax: Taxes imposed on tourists and travelers to generate revenue from the tourism industry. Treasury: Moderate: The treasury contains a moderate amount of funds, enough to support essential services but with limited extravagance."
                },
                {
                  "key": "Trade",
                  "value": "Dream Crystals: The country mines and exports unique crystals that can be used to access dream realms and visions. Chief export: Starfallen Iron: Iron meteorites fallen from the stars, used in creating enchanted and celestial-themed weapons. Luxury trade: Pegasus Mane Tapestries: Tapestries woven from the manes of pegasi, displaying ethereal and breathtaking scenes."
                },
                {
                  "key": "Cuisine",
                  "value": "Forest's Bounty: Wholesome and rustic dishes incorporating wild game, berries, and nuts found within the enchanted forests."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Infiltration and Betrayal: The party members may be tempted or coerced to infiltrate the resistance movement and report back to the authorities."
            }

                  "value": "Autocracy — “The single leader holds absolute and centralized power, not limited by any constitution, laws, or checks and balances.” In an autocratic government, a single individual, the autocrat or monarch, holds absolute and centralized power. Decisions are made without constraints or input from others, and political opposition is suppressed. Personal freedoms are limited, and the ruler often cultivates a personality cult. Information is tightly controlled, and dissent is met with repression. The ruler's authority is undisputed, creating a climate of fear and obedience among the populace. (Compare: United Arab Emirates (UAE), Singapore) Leadership: Emperor Valerius the Conqueror: From his vast Empire, Emperor Valerius seeks to expand his domain through conquest, instilling both fear and loyalty in his subjects. State goals: Suppress Ethnic or Religious Divisions: In diverse realms, autocrats may aim to suppress ethnic or religious tensions to prevent them from destabilizing the government. / Suppress Ethnic or Religious Divisions: In diverse realms, autocrats may aim to suppress ethnic or religious tensions to prevent them from destabilizing the government. Methods: Secret Police: Maintain a strong secret police force to silence dissidents and uncover potential threats. / Institute Martial Law: Impose martial law in times of crisis or unrest to assert absolute control. The citizenry wants: Concealing Dissent: To express dissent in subtle and concealed ways to avoid detection. Complication: Controlled Religion: The autocrat co-opts religious institutions to endorse their rule, leading to a moral dilemma for the party."

              "type": "paragraph",
              "label": "At First Glance",
              "text": "Empowering Atmosphere: Policies that empower citizens and promote citizen engagement lead to an empowering atmosphere."

            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Confederacy — “Individual states, regions, or territories come together to form a loose political alliance or federation. Each member retains a significant degree of sovereignty and autonomy, and the central governing authority has limited powers, typically restricted to matters of common interest and defense. Power is distributed among its member states, and decisions often require consensus or agreement among the participants.” A confederacy embodies a form of government in which independent states or regions form a loose alliance, each retaining its own governance and authority over internal affairs. The central governing body, if present, possesses limited powers and primarily focuses on coordinating collective efforts and resolving disputes among member states. Voluntary participation characterizes this alliance, allowing states to join or leave as they see fit. In matters of decision-making, each member state enjoys equal representation, fostering an atmosphere of fairness and cooperation. While united in common defense against external threats, the confederacy refrains from interfering in the internal affairs of its members. It stands as a flexible arrangement, formed for specific purposes, allowing states to pursue shared goals while maintaining their unique identities and self-governance. The confederacy navigates a delicate balance between centralization and decentralization, offering a dynamic setting for diverse interactions, political negotiations, and the exploration of unity amidst diversity. (Compare: European Union, United Nations) Leadership: High Druid Branwen Earthsong: A venerable druid with deep connections to nature, advocating for environmental protection and sustainable practices within the confederacy. State goals: Intercultural Artistic Exchange: To encourage artistic exchange and collaboration among different cultures, enriching the fantasy realm's creative tapestry. / Crisis Preparedness: To establish coordinated strategies and plans to respond effectively to unforeseen crises, ensuring the confederacy's resilience. Methods: Interstate Sporting Events: Organizing interstate sporting events that bring together athletes and spectators from diverse backgrounds. / Joint Infrastructure Projects: Undertaking joint infrastructure projects that benefit multiple member states, improving connectivity and trade. The citizenry wants: Defense and Security: To ensure the collective defense and security of the confederacy against external threats. Complication: Varying Laws and Regulations: Adhering to different sets of laws and regulations as they move between member states, leading to potential legal challenges."

                {
                  "key": "Economy",
                  "value": "Feywild's Glamour Market: An otherworldly economy where fey creatures trade in glamour-infused items, dreams, and illusions. Wealth: Slavery-Based Economy: A morally questionable system where wealth is built on the exploitation of enslaved individuals, leading to extreme inequality. Taxes: Enchanted Trade Tariffs: Taxes imposed on magical goods and artifacts traded between different mystical realms. Treasury: Resourceful: Despite limited resources, the government employs creative solutions to manage the treasury effectively."

            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Democracy — “The voice of the people becomes the force that shapes a nation's destiny.” The archetype of a democratic government is a system in which power is vested in the hands of the people, either directly or through elected representatives. In a democratic government, citizens have the right to participate in decision-making processes, elect leaders, and shape public policies through voting and other forms of political engagement. The fundamental principles of democracy include political equality, individual freedoms, rule of law, protection of human rights, and respect for diverse opinions and perspectives. This archetype promotes government accountability and transparency, fostering a society where the collective will of the people influences the direction of the nation. (Compare: United States, Canada, Australia) Leadership: Isabella Swiftwind: A halfling mayor who leads her town with compassion and a commitment to fostering a strong sense of community. State goals: Transparency and Accountability: Promoting transparency in governance and holding public officials accountable for their actions. / Protecting Human Rights: Upholding the fundamental rights and dignity of every individual, regardless of race, gender, or background. Methods: Compromise and Consensus: Encouraging dialogue and finding common ground among different factions to reach collective decisions. / Public Consultations: Engaging citizens in open discussions and surveys to gather their input on important decisions. The citizenry wants: Inclusiveness in Decision-Making: To ensure representation of diverse groups in the democratic process. Complication: Bureaucratic Red Tape: The party faces bureaucratic hurdles and legal procedures that slow down their progress."
                },

              "type": "paragraph",

            {
              "type": "paragraph",
              "label": "Within",
              "text": "No blinking!- As soon as the players step into this room the door locks behind them. The room is mostly normal with the exception that one wall has the words ‘no blinking!’ Written out in huge letters. If the players blink they see where the key is hidden, but only for a split second."

              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A large square room, a small maze-like pathway in between pressure plates is on the the floor and leads to the other size. If a pressure plate is stepped on, a giant cube slime falls from above filling the whole room. Players must take 1d4 acid damage every turn of the slime until they escape."
                },
                {
                  "key": "Scrawled Here",
                  "value": "There is a short and narrow room; the long-rotted remains of a door hang off hinges at the entrance. Scrawled along one wall, in an ancient language the party must translate is ‘[Name of some long-dead king] gobbles donkey goobers’. The opposite wall is also marked, with ‘[Name of long-dead queen] does the nasty.’ If the party succeeds on a perception check they realize they’re standing in a toilet stall."

                {

              "type": "paragraph",
              "label": "Backstory",
              "text": "Charlatan: Made up a really impressive sounding fake name off the cuff while being arrested which turned out to be a real, very important person. Interpreting the announcement of their arrest as some sort of provocation, a series of insults and slights escalated into an actual border war... in which the character was an active profiteer."

          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Chin: A cleft in the chin · Jewelry: A jeweled hairband with enchanting floral motifs made of silver."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Mischeivious When stressed: Authoritarian"
                },
                {
                  "key": "Right Now",

                },
                {
                  "key": "Wants",

                },
                {
                  "key": "Flaw",
                  "value": "this person is hiding something."
                },
                {
                  "key": "Quirk",
                  "value": "You frequently try to rhyme your sentences. You are very bad at it…"
                },
                {
                  "key": "Faith",
                  "value": "Outspoken cynic."
                },
                {
                  "key": "Keepsake",
                  "value": "Tall leather boots that are highly resistant to piercing damage. Made for a hunter who tended to forget where he laid his bear traps."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "Torn Ear"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Has no other family but the party"
            },
            {
              "type": "paragraph",
              "label": "If Asked About Home",
              "text": "Downwater – bordered on the West by salt flats, Downwater was erected around a cavernous waterhole with no visible floor. The buildings are made mostly of wood, with stonemasonry reserved for the foundations and skeleton of more important buildings. The dusty streets are wide open and salted seasonally to prevent local poisonous plants from growing. Salt scraping and mining provide most of the town’s jobs. The sinkhole used to be filled with drinkable water, but its water level began dropping a few years back and now it’s impossible to see the water line from the surface. A lengthy, rickety pipe system has been constructed to siphon the water up."
            }
          ],
          "id": "b_ngh5gam4"
        }

      "body": [
        {
          "type": "paragraph",
          "id": "b_e0mbhimo",
          "text": "{@e e_qmmy88uaxymxjf|The Timelost Goods Shop} and {@e e_s793g9t3riluw5|The Thieves' Market Shop} have not shared a civil word in years. {@e e_z52xhhtezr1z70|Mula Valrihd} and {@e e_sq64j6zg7td0bt|Isotta} each swear the other started it; {@e e_rhuuwk8jwdvh3n|Lyric} and {@e e_6avz7rqx2wha2a|Windsor} take different sides at every family supper."
