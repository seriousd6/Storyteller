    "e_cvje4sz5sskm1h": {
      "id": "e_cvje4sz5sskm1h",
      "kind": "landmark",
      "name": "Windowshire",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Windowshire",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "A frozen cliff to the far north where a primordial rune of strength is carved into the cliffs face. No one is sure of who chiseled the rune into the cliff."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "There is a helmet in the corner of this room/chamber. In the next room, there is an identical helmet. This continues for every single room afterwards. Any rooms visited before the first time the party noticed these helmets also have an identical helmet. If someone dons the helmet, they see all of the rooms of the dungeon at once, taking 2d12 psychic damage with a WIS save to halve the damage. This psychic damage occurs every time someone dons the helmet, but if they stick through with it rather than removing it, it can be used to get a brief glimpse of whatever an identical helmet would see in another room once every ten turns by passing a perception check. While someone wears a helmet, the other helmets seemingly vanish. Any damage or modifications inflicted to one helmet is performed on all the others."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "Walking through an area with “Dormant hives of bees,” there is a queen bee figurine with a stinger shaped like a key in a glass jar at the opening of a room. The jar acts as a seal to keep the pheromones of the queen away from the rest of her hive. Once removed from the jar to unlock a mysterious key hole, the once dormant hives awaken to attack whomsoever holds “their queen.”"
                },

            {
              "type": "paragraph",
              "label": "The Premises",
              "text": "The Meat Market: run by a shadowy figure in torn robes, this odd shop gives permanent magical effects in exchange for body parts. The more important the organ or body part, the better the effect. The effect goes to whoever the part comes from, so don’t get greedy!"

                "Painting, medium (10gp) stock: Made to order | Example Depicts a gnome & her pet giant bee",

                "Statue, precious (2,000gp) stock: Made to order | Example An enormous adamantine dragon"
              ]

              "type": "keyValue",
              "pairs": [
                {
                  "key": "Keeper Personality",
                  "value": "I have a much better head for numbers than people."
                },
                {
                  "key": "Ideal",
                  "value": "Enjoyment. Buying and selling wares is all a big game to me, one that I love playing. (Any)"
                },
                {
                  "key": "Bond",
                  "value": "I'm on the run from the law, and plan to leave town before they finally recognize me."
                },
                {

    "e_vzvw5jdb3r7o2z": {
      "id": "e_vzvw5jdb3r7o2z",
      "kind": "landmark",
      "name": "Winterglade",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Winterglade",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "A forest where the dead never rot, covering the ground in thick layers of fallen trees thick enough to walk on. Be careful not to set fire to them, or the whole ground will go up in flames."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "A dead end – The tunnel the party is walking down has them run headlong into a Giant!! Well, the upper torso of the giant. He’s not hostile and is pinned in place by the surrounding walls as he was chasing dinner down a hole and has wiggled himself into this tunnel, blocking any forward movement. If the party attacks him, he will yell and cry, ‘Stop it, please!’ and be overly pathetic, but with his arms pinned at his sides, they will likely kill him in time (suggest higher hit points than normal so the party has to take their time). If they chat with him, he knows a bit about the surrounding rooms as he’s seen creatures moving through the halls and possibly former adventurers. His name is Gordum, and he’s really hungry as he hasn’t eaten in a very long time. Normally, adventurers take pity on him and feed him while they make their way through the dungeon, but the real reason he stays stuck here is a ring of sustenance that he found years ago and pull on ’cause it was shiny.’ If he’s friendly, he offers to watch over the party while they sleep and promises to warn them if anyone else comes down the hallway."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "An animated armor using a flying sword. After the armor is defeated, the sword begins to fight."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘I must not tell lies.’"
                }
              ]
            }
          ],
          "id": "b_gb9o4bje"
        }
      ],

    "e_wsy9m99ojmkysc": {

      "kind": "person",

      "fields": {

      },
      "body": [
        {
          "type": "statblock",
          "name": "Makepeace",
          "meta": "Human (male) · Architect (Architecture and Construction)",
          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Hands: Powerful · Markings: a tattoo (Impressively lifelike work): A name — on the leg."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Reserved When stressed: Stubborn"
                },
                {
                  "key": "Right Now",
                  "value": "Agitated."
                },
                {
                  "key": "Fears",
                  "value": "being arrested for illegal activity"
                },
                {
                  "key": "Flaw",
                  "value": "Prejudice — A Profession: specifically toward clergy"
                },
                {
                  "key": "Quirk",
                  "value": "They often say: “Not an anvil's chance in a nest of rust monsters”"
                },
                {
                  "key": "Faith",
                  "value": "Cautious listener."
                },
                {
                  "key": "Keepsake",
                  "value": "A bedroll that creates a mild water repellent barrier around it as long as someone is laying on it. A gift made for a traveling merchant so that he wouldn’t worry about sleeping in the rain."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "intricately braided hair"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "looking to resolve a lost bet"
            }
          ],
          "id": "b_23u0n20b"
        }
      ],

    "e_13c83ccsiosd1k": {
      "id": "e_13c83ccsiosd1k",
      "kind": "landmark",
      "name": "Obsidian Oasis",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Obsidian Oasis",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "The Angry Spot – a small stone platform on the top of a hill, standing on the platform makes a person irrationally angry. Barbarians may involuntarily rage as a result."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "The room is raining?"
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A seemingly wooden door that says “Knock”. Knock on the door to enter. ALTERNATIVELY: a seemingly wooden door, badly worn; it seems as if it could just be destroyed. Players can see the other side, in fact. Catch? Nobody but the weakest among any group that approaches it, can open it. It cannot be destroyed by anything."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘Look behind you. Now!’"
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "The Truth of It",
              "text": "Unwanted Rescue: Turns out the NPC victim never wanted to be rescued by the PCs in the first place"
            }
          ],
          "id": "b_u6k3e0w5"
        }
      ],

    return `<div class="frow"><div class="fl">${esc(label)}</div><div>${shown}</div></div>`;
  }
  const type = def?.type ?? (typeof v === 'number' ? 'number' : 'text');
  let control;
  if (type === 'entityRef') {
    const opts = Object.values(E()).filter(x => !x.deleted && (!def?.refKind || x.kind === def.refKind))
      .map(x => `<option value="${x.id}" ${v?.ref === x.id ? 'selected' : ''}>${esc(x.name)}</option>`).join('');
    control = `<select data-fkey="${key}" data-ftype="entityRef"><option value="">—</option>${opts}</select>`;
  } else if (type === 'longtext') {
    control = `<textarea data-fkey="${key}" data-ftype="longtext" placeholder="…">${esc(v ?? '')}</textarea>`;
  } else if (type === 'number') {
    control = `<input type="number" data-fkey="${key}" data-ftype="number" value="${v ?? ''}">`;
  } else {
    const shown = v && typeof v === 'object' && v.date ? v.date : Array.isArray(v) ? v.join(', ') : (v ?? '');
    control = `<input data-fkey="${key}" data-ftype="${type}" value="${esc(shown)}" placeholder="…">`;
  }
  return `<div class="frow"><div class="fl">${esc(label)}</div><div>${control}</div></div>`;
}

// ---------- page ----------
function entityOptions(exclude) {
  return Object.values(E()).filter(x => !x.deleted && x.id !== exclude)
    .map(x => `<option value="${x.id}">${icon(x)} ${esc(x.name)}</option>`).join('');
}
function renderPage() {
  const art = document.getElementById('page');
  const ents = E();
  if (!current || !ents[current]) {
    art.innerHTML = `<h2 class="title">Vessia</h2>
      <p>This is the Phase 0 fixture world, now <b>editable</b>: pick a page from the tree, then rename it,
      fill in its fields (the labels are prompts), write in its entry, and add new pages inside it with
      the kind buttons at the bottom of each page. Blue links are live cross-references; every page shows
      what links back to it. Your changes persist in this browser — use <b>Export JSON</b> to take them out,
      or <b>Reset to fixture</b> to start over.</p>
      <p class="ghostnote">Not in this prototype (comes with the real engine): generated suggestions
      (ghosts), the map, search, and undo. The point here is the feel of building a linked world by hand.</p>`;
    return;
  }
  const e = ents[current];
  const kind = byKind[e.kind] ?? { childKinds: [], suggestedFields: [] };
  const chain = []; let p = e.parentId;
  while (p && ents[p]) { chain.unshift(link(p)); p = ents[p].parentId; }
  let html = `<div class="crumbs">${chain.length ? chain.join(' › ') + ' ›' : 'Vessia'}</div>`;
  html += `<h2 class="title"><span>${icon(e)}</span><span id="nameSpan">${esc(e.name)}</span>` +
    `<span class="kindchip">${e.kind}${e.deleted ? ' · deleted' : ''}</span>` +
    (playerView ? '' : `<button class="small" id="renameBtn" title="rename">✏️</button>`) + `</h2>`;
  if (e.aliases?.length) html += `<div class="aliases">also called ${e.aliases.map(esc).join(', ')}</div>`;
  if (e.tags?.length) html += `<div class="tags">${e.tags.map(t => `<span>${esc(t)}</span>`).join('')}</div>`;

  // fields: suggested first (prompt labels teach), then any extra keys
  const sugg = kind.suggestedFields ?? [];
  const extraKeys = Object.keys(e.fields ?? {}).filter(k => !sugg.some(s => s.key === k));
  const rows = sugg.map(d => fieldRow(e, d, d.key)).join('') + extraKeys.map(k => fieldRow(e, null, k)).join('');
  if (rows.trim() || !playerView) {
    html += `<section><h3>Details<span class="sp"></span>${playerView ? '' : '<button class="small" id="addFieldBtn">+ field</button>'}</h3>${rows}</section>`;
  }

  // body
  html += `<section><h3>Entry<span class="sp"></span>${playerView ? '' : '<button class="small" id="addParaBtn">+ paragraph</button>'}</h3>`;
  for (const b of e.body ?? []) {
    const secret = (e.secretBlocks ?? []).includes(b.id);
    if (secret && playerView) continue;
    const cls = `block${secret ? ' secret' : ''}`;
    if (editingBlock === b.id && !playerView) {
      html += `<div class="${cls} blockedit" data-bid="${b.id}">
        <textarea id="blockTa">${esc(b.text ?? '')}</textarea>
        <div class="rowtools">
          <select id="linkSel"><option value="">insert link to…</option>${entityOptions(e.id)}</select>
          <button class="small" id="blockSave">Save</button>
          <button class="small" id="blockCancel">Cancel</button>
          <span>links are typed as {@e id|text}</span>
        </div></div>`;
      continue;
    }
    const tools = playerView ? '' : `<span class="btools">
      <button class="small" data-edit="${b.id}">✏️</button>
      <button class="small" data-secret="${b.id}" title="toggle secret">${secret ? '🔓' : '🔒'}</button>
      <button class="small" data-delblock="${b.id}">✕</button></span>`;
    if (b.type === 'statblock') { html += `<div class="${cls}">${tools}<div class="statb"><div class="sbname">${esc(b.name ?? '')}</div></div></div>`; continue; }
    const label = b.label ?? (secret ? 'Secret' : '');
    html += `<div class="${cls}">${tools}${label ? `<div class="label">${esc(label)}</div>` : ''}${renderText(b.text ?? '')}</div>`;
  }
  if (!(e.body ?? []).length) html += `<div class="ghostnote">Nothing written yet.</div>`;
  html += `</section>`;

  if (e.relations?.length) {
    html += `<section><h3>Relations</h3><ul class="rel">` +
      e.relations.map(r => `<li>${esc(r.type)} → ${link(r.target)}</li>`).join('') + `</ul></section>`;
  }
  const backs = backlinksTo(current);
  if (backs.length) {
    html += `<section><h3>Referenced by</h3><ul class="backs">` +
      backs.map(id => `<li>${icon(ents[id])} ${link(id)}</li>`).join('') + `</ul></section>`;
  }
  const sites = sitesFor(current);
  if (sites.length) {
    html += `<section><h3>Site maps</h3><div class="floors">` +
      sites.flatMap(site => site.floors.map((f, i) =>
        `<div class="floorbox"><canvas class="floor" data-site="${site.id}" data-floor="${i}"></canvas>
         <div>${esc(f.label)} — ${f.w}×${f.h} @ ${site.cellFt} ft${Object.values(f.cells ?? {}).some(c => c.entityId)
           ? ' · ' + Object.values(f.cells).filter(c => c.entityId).map(c => link(c.entityId)).join(', ') + ' placed here' : ''}</div></div>`
      )).join('') + `</div></section>`;
  }

  // add-inside
  if (!playerView && !e.deleted) {
    const kinds = (kind.childKinds ?? []).map(k =>
      `<button data-addkind="${k}">${byKind[k]?.icon ?? ''} ${esc(byKind[k]?.label ?? k)}</button>`).join('');
    html += `<section><h3>Add inside ${esc(e.name)}</h3><div class="addkinds">${kinds || '<span class="ghostnote">this kind holds nothing</span>'}</div>`;
    if (addingKind) {
      html += `<div class="newform">${byKind[addingKind]?.icon ?? ''}
        <input id="newName" placeholder="Name the new ${esc(byKind[addingKind]?.label ?? addingKind)}…">
        <button id="createBtn">Create</button><button id="cancelAdd" class="small">✕</button></div>`;
    }
    html += `<div class="ghostnote" style="margin-top:8px">In the full app, generated suggestions (ghosts) appear here too — keep, reroll, or dismiss.</div></section>`;
  }

  if (!playerView && e.gen) {
    html += `<div class="provenance">generated by ${esc(e.gen.generator)}` +
      `${e.gen.role ? ` · role “${esc(e.gen.role)}” of ${esc(e.gen.plan)}` : ''}<br>seed ${esc(e.gen.seed)}` +
      `${e.gen.overrides?.length ? `<br>kept by hand: ${esc(e.gen.overrides.join(', '))}` : ''}</div>`;
  }
  if (!playerView) {
    for (const c of (WORLD.conflicts ?? []).filter(c => c.entityId === current))
      html += `<div class="conflict">⚠ sync conflict inbox: a copy of this page lost a merge at ${esc(c.at)} — kept for review, never silently dropped.</div>`;
    html += `<div style="margin-top:18px">${e.deleted
      ? `<button id="restoreBtn">Restore this page</button>`
      : `<button id="deleteBtn">Delete this page</button>`}</div>`;
  }
  art.innerHTML = html;
  art.querySelectorAll('canvas.floor').forEach(cv => {
    const site = WORLD.planes.flatMap(p => p.sites ?? []).find(s => s.id === cv.dataset.site);
    drawFloor(cv, site.floors[Number(cv.dataset.floor)]);
  });
  wirePage(e, kind, sugg);
}

// ---------- wiring ----------
function wirePage(e, kind, sugg) {
  const $ = id => document.getElementById(id);
  $('renameBtn')?.addEventListener('click', () => {
    const span = $('nameSpan');
    span.innerHTML = `<input id="nameInput" value="${esc(e.name)}">`;
    const inp = $('nameInput'); inp.focus(); inp.select();
    const commit = () => { const v = inp.value.trim(); if (v) { e.name = v; touch(e); } rerender(); };
    inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') commit(); if (ev.key === 'Escape') rerender(); });
    inp.addEventListener('blur', commit);
  });
  document.querySelectorAll('[data-fkey]').forEach(ctl => {
    ctl.addEventListener('change', () => {
      const key = ctl.dataset.fkey, type = ctl.dataset.ftype;
      e.fields ??= {};
      if (type === 'entityRef') { if (ctl.value) e.fields[key] = { ref: ctl.value }; else delete e.fields[key]; }
      else if (type === 'number') { if (ctl.value === '') delete e.fields[key]; else e.fields[key] = Number(ctl.value); }
      else if (type === 'date') { if (ctl.value) e.fields[key] = { date: ctl.value }; else delete e.fields[key]; }
      else { if (ctl.value.trim() === '') delete e.fields[key]; else e.fields[key] = ctl.value; }
      touch(e);
      if (type === 'entityRef') rerender();
    });
  });
  $('addFieldBtn')?.addEventListener('click', () => {
    const key = prompt('Field name (letters/numbers, e.g. "banner"):');
    if (!key || !/^[a-z][a-zA-Z0-9]*$/.test(key)) return alert('Use a lowercase-first alphanumeric key.');
    e.fields ??= {}; e.fields[key] ??= ''; touch(e); rerender();
  });
  $('addParaBtn')?.addEventListener('click', () => {
    e.body ??= [];
    const b = { type: 'paragraph', id: 'b_' + rid('').slice(0, 8), text: '' };
    e.body.push(b); editingBlock = b.id; touch(e); rerender();
  });
  document.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => { editingBlock = btn.dataset.edit; rerender(); }));
  document.querySelectorAll('[data-delblock]').forEach(btn =>
    btn.addEventListener('click', () => {
      e.body = (e.body ?? []).filter(b => b.id !== btn.dataset.delblock);
      e.secretBlocks = (e.secretBlocks ?? []).filter(id => id !== btn.dataset.delblock);
      touch(e); rerender();
    }));
  document.querySelectorAll('[data-secret]').forEach(btn =>
    btn.addEventListener('click', () => {
      const id = btn.dataset.secret;
      e.secretBlocks ??= [];
      e.secretBlocks = e.secretBlocks.includes(id) ? e.secretBlocks.filter(x => x !== id) : [...e.secretBlocks, id];
      touch(e); rerender();
    }));
  const ta = $('blockTa');
  if (ta) {
    $('linkSel')?.addEventListener('change', ev => {
      const id = ev.target.value; if (!id) return;
      const ins = `{@e ${id}|${E()[id].name}}`;
      const s = ta.selectionStart ?? ta.value.length;
      ta.value = ta.value.slice(0, s) + ins + ta.value.slice(ta.selectionEnd ?? s);
      ev.target.value = ''; ta.focus();
    });
    $('blockSave')?.addEventListener('click', () => {
      const b = (e.body ?? []).find(b => b.id === editingBlock);
      if (b) { b.text = ta.value; touch(e); }
      editingBlock = null; rerender();
    });
    $('blockCancel')?.addEventListener('click', () => { editingBlock = null; rerender(); });
    ta.focus();
  }
  document.querySelectorAll('[data-addkind]').forEach(btn =>
    btn.addEventListener('click', () => { addingKind = btn.dataset.addkind; rerender(); setTimeout(() => $('newName')?.focus(), 0); }));
  $('cancelAdd')?.addEventListener('click', () => { addingKind = null; rerender(); });
  const create = () => {
    const name = $('newName')?.value.trim();
    if (!name || !addingKind) return;
    const ne = { id: rid('e_'), kind: addingKind, name, parentId: e.id, fields: {}, body: [],
                 rev: 1, created: now(), updated: now() };
    E()[ne.id] = ne; WORLD.rev++; WORLD.updated = now(); save();
    addingKind = null; navigate(ne.id);
  };
  $('createBtn')?.addEventListener('click', create);
  $('newName')?.addEventListener('keydown', ev => { if (ev.key === 'Enter') create(); });
  $('deleteBtn')?.addEventListener('click', () => {
    if (!confirm(`Delete “${e.name}”? (It becomes a tombstone; children are kept.)`)) return;
    e.deleted = now(); touch(e); rerender();
  });
  $('restoreBtn')?.addEventListener('click', () => { delete e.deleted; touch(e); rerender(); });
}

// ---------- shell ----------
function rerender() { renderTree(); renderPage(); }
function navigate(id) { current = id; editingBlock = null; addingKind = null; rerender(); }
document.addEventListener('click', ev => {
  const t = ev.target.closest('a[data-id], .node[data-id]');
  if (t) { ev.preventDefault(); navigate(t.dataset.id); }
});
document.getElementById('playerView').addEventListener('change', ev => {
  playerView = ev.target.checked;
  editingBlock = null; addingKind = null;
  if (playerView && current && E()[current]?.deleted) current = null;
  rerender();
});
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(WORLD, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = (WORLD.name || 'world') + '.json'; a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Discard all your changes and restore the original fixture world?')) return;
  localStorage.removeItem(LS_KEY); location.hash = ''; location.reload();
});
document.getElementById('addRootBtn').addEventListener('click', () => {
  const name = prompt('Name the new top-level region:');
  if (!name?.trim()) return;
  const ne = { id: rid('e_'), kind: 'region', name: name.trim(), fields: {}, body: [],
               rev: 1, created: now(), updated: now() };
  E()[ne.id] = ne; WORLD.rev++; WORLD.updated = now(); save();
  navigate(ne.id);
});
window.addEventListener('hashchange', () => { const id = location.hash.slice(1); if (E()[id]) navigate(id); });
if (E()[location.hash.slice(1)]) current = location.hash.slice(1);
rerender();
</script>
