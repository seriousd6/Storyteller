          "meta": "Gnome (female) · Monk (Religion)",
          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Speaking: Narcoleptic, as in falls asleep mid sentence and the players must attempt to wake them up somehow · Jewelry: A pair of silver earrings with delicate engravings made of pewter."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Artistic When stressed: Fanatical"
                },
                {
                  "key": "Right Now",
                  "value": "Disagreeable."
                },
                {
                  "key": "Fears",
                  "value": "losing a precious family heirloom"
                },
                {
                  "key": "Flaw",
                  "value": "Gossips."
                },
                {
                  "key": "Quirk",
                  "value": "They love telling this story: James the Wanderer - Adventurer, world traveler, and unabashed debtor. James may have been a real figure at some point but his story grew well beyond reality over the years. A book, titled The Musings of James the Wanderer is a collection of helpful aphorism by the legendary figure himself. James was wise in his way but also kind of a dolt. Some examples are, 'A road of gold is both loud and slippery 'and 'If all else fails, kick them in the fork '"
                },
                {
                  "key": "Faith",
                  "value": "Cautious listener."
                },
                {
                  "key": "Keepsake",
                  "value": "A large conch shell that, when put to the ear, makes the wielder hear the sounds of the ocean. If you close your eyes while doing so, you’ ll see visions of infinite horizons and calming ocean waves. A gift from a pirate lord to his estranged, landlocked son to give him at least a glance as to why he left."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "If some says any number lower than 8, your must pass a constitution check or keep counting to 8."
            }

              "type": "paragraph",
              "label": "The Site",
              "text": "The Wrecked Ship – The sun-bleached wreckage of a ship that ran aground long ago. Inside the hull is a massive cage with thick steel bars that appear to have been smashed outward from the inside."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "The group finds a long forgotten coin hoard. All is not as it seems, some of the coins are tiny-sized mimics (maybe individuals, maybe swarms), that adhere to and attack those that try to gather the treasure."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A long passage of murky, depthless water. Two boats are tied up at the entrance- one that looks rickety and has a little water in the bottom, and one that is new looking, gilded on the edges and looks really watertight. Turns out the “new” boat is actually an illusion, and it disappears in a puff of smoke about halfway through."
                },
                {
                  "key": "Scrawled Here",
                  "value": "Written in very tiny letters: ‘If you can read this, you can’t see the goblin sneaking up behind you.’"
                }
              ]
            }
          ],
          "id": "b_aoa15vyp"
        }

    "e_iv2zmwfvg6v09k": {
      "id": "e_iv2zmwfvg6v09k",
      "kind": "landmark",
      "name": "Winterglade",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Winterglade",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "Stairway to Nowhere – All that remains of an ancient fortress, the remarkably well constructed staircase rises for 3 stories out of the ground at the end of an ancient road, and then just abruptly stops."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "A door painted onto a wall with two door knobs sticking out, one labeled ‘fame’ the other ‘fortune’. Touching fame will turn you as blue as a smurf, only reversible by a wish. Fortune will cause 10,000 cp to fall from the ceiling at great speed causing heavy damage."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "Kobolds are light, and armor is heavy: A well prepared Kobold always has an escape route. And his escape route is generally one only a Kobold can use. While most Kobolds choose to make tight passages that only a Tiny creature can squeeze into (thanks to their ability to fit into unlikely places), some rely on the fact that their pursuers are generally heavier, and in larger numbers, than themselves. Choose a corridor, and undermine it (dig a tunnel under the floor, but with too little material acting as floor/ceiling). Leave it just enough strength to handle the weight of a Kobold or two. Fill the corridor below with something nasty, and have it lead somewhere nasty. As a finishing touch, make sure there’s a collapsing ceiling in the upper tunnel as well to ensure that the heroes can’t climb back out after you."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘Grall Stonebringer was here.’"
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "The Truth of It",
              "text": "The adventurers are racing against other creatures with the same or opposite goal"
            }
          ],
          "id": "b_0n39h4y0"
        }
      ],

    "e_swgv44ya8p2ebs": {
      "id": "e_swgv44ya8p2ebs",
      "kind": "settlement",
      "name": "Newgate",
      "fields": {
        "population": 10836
      },
      "body": [
        {
          "type": "statblock",
          "name": "Newgate",
          "meta": "Town · pop. 725",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Cautious Atmosphere: The government's cautious approach to decision-making influences the overall atmosphere."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Meritocracy — “Rise to power through merit and ability, a society guided by the capable hands of its best.” The archetype of a meritocracy is a form of government where individuals are selected for positions of power and influence based on their abilities, talents, and qualifications. In a meritocracy, leadership positions are earned through merit and demonstrated competence rather than inherited or determined by factors like social class, wealth, or family background. The idea behind a meritocracy is that the most capable individuals rise to leadership positions, leading to efficient and effective governance. (Compare: None, some Companies, Academic institutions, and professional associations may use this.) Leadership: Master Artisan Gabriella Moonshadow - In charge of preserving and promoting the nation's artistic heritage, supporting talented artists and craftsmen in their pursuit of excellence. State goals: Maintain National Security - To ensure the safety and security of the nation, relying on strategic minds and skilled military leaders to defend against potential threats. / Empower Local Governance - To decentralize decision-making and empower local governments, recognizing the importance of tailoring policies to specific community needs. Methods: Performance-Based Rewards - Offering performance-based rewards and bonuses to motivate citizens to continually excel in their fields. / Specialized Training Programs - Creating specialized training programs to hone specific skills required for critical roles. The citizenry wants: Recognition of Achievements - To be acknowledged and rewarded for one's accomplishments and contributions to society, fostering a culture of recognition and appreciation. Complication: Sabotage from Rivals - Competing talented individuals or factions may attempt to sabotage the party's efforts to protect their interests."
                },
                {
                  "key": "Morale",
                  "value": "Apathetic Morale: Citizens show little interest in political issues and are disengaged from the nation's well-being."
                },
                {
                  "key": "Economy",
                  "value": "Knowledge Economy: An economy where knowledge, skills, and intellectual capital are the primary drivers of growth and prosperity. Wealth: Spiritual Communion: An economy centered around spiritual exchange, where devout individuals are rewarded with blessings and prosperity. Taxes: Arcane Tithe: A magical tax levied on spellcasters and magical entities to support the realm's magical infrastructure and research. Treasury: Struggling: The treasury is facing financial struggles, resulting in a lack of funds for vital services."
                },
                {
                  "key": "Trade",
                  "value": "Moonstone Carvings: The country's skilled lapidaries craft intricate carvings from moonstones, capturing their lunar essence. Chief export: Entwood Timber: Wood from sentient trees known as Ents, used in crafting items that grant enhanced communication with nature. Luxury trade: Golem Stone Statuettes: Miniature statuettes made from the stones used to craft golems, known for their protective properties."
                },
                {
                  "key": "Cuisine",
                  "value": "Sphinx's Enigmas: Intriguing and enigmatic dishes served with riddles and puzzles to stimulate the mind and palate."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Censored Communication - Restrictions on communication and encryption to prevent organization."
            },
            {
              "type": "paragraph",
              "label": "Behind Closed Doors",
              "text": "Diplomatic Dialogue: The government prioritizes peaceful negotiations and open dialogue with other nations to foster cooperation."
            }
          ],
          "id": "b_5c2mik1x"
        }
      ],

          "meta": "Town · pop. 3601",
          "sections": [

              "type": "paragraph",
              "label": "At First Glance",
              "text": "Hopeful Atmosphere: Positive developments and promising initiatives foster hope and optimism for the nation's future."

            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Magocracy — “The wielders of magic reign supreme, shaping the fate of the nation with their mystical might.” The archetype of a magocracy is a form of government where magic-users, such as wizards, sorcerers, or other spellcasters, hold dominant political power. In a magocracy, magical prowess and knowledge are highly valued, and those with exceptional magical abilities often rule over non-magical citizens. Magic is not only a means of governing but also a foundation of the society, influencing laws, culture, and even daily life. The ruling class of magicians may form a council or a single all-powerful Archmage, wielding their mystical abilities to control the nation and maintain order. However, this concentration of magical power can lead to tensions and conflicts with those who lack magical abilities, and strict rules and regulations may be enforced to prevent the misuse of magic or potential rebellions among the non-magical populace. The magocracy's success and stability hinge on the responsible and benevolent use of magic and the ability to strike a delicate balance between magical and non-magical citizens' interests. (Compare: Hogwarts, the Somnovum) Leadership: Druidic Hierarch Thorian Mosswood - Respected by nature itself, Druidic Hierarch Thorian channels the spirits of the land to maintain the magocracy's ecological balance and harmony. State goals: Magical Expertise - Cultivating an elite cadre of masterful magic users, who serve as advisors, strategists, and protectors of the magocracy. / Magical Diplomacy - Harnessing magical diplomacy to establish alliances, foster trade, and influence other nations, using magical expertise as a diplomatic advantage. Methods: Magical Aid Missions - Sending magical aid and support to other nations in times of crisis. / Magical Arts Sponsorship - Sponsoring magical artists and performers to enrich cultural experiences. The citizenry wants: Protection from Dark Magic - Aspiring to live in a society safeguarded from the influence of dark magic and malevolent sorcery. Complication: Magical Creatures and Anomalies - The presence of magical creatures or unpredictable magical anomalies can pose dangers during the party's travels."
                },

                },
                {
                  "key": "Economy",
                  "value": "Gift Economy: A system based on gifting goods and services without explicit expectations of immediate or direct reciprocity. Wealth: Egalitarian Communes: Small self-sustained communities where resources and wealth are shared equally among all members. Taxes: Potion Ingredients Tariff: Taxing the import and export of rare potion ingredients and magical components. Treasury: Moderate: The treasury contains a moderate amount of funds, enough to support essential services but with limited extravagance."

                  "value": "Spiritual Artifacts: The nation's temples create and export artifacts that hold spiritual significance and divine blessings. Chief export: Orichalcum Ingot: A rare and magical metal with luminescent properties, used in the creation of ancient artifacts. Luxury trade: Pegasus Mane Tapestries: Tapestries woven from the manes of pegasi, displaying ethereal and breathtaking scenes."

                  "key": "Government",
                  "value": "Plutocracy — “Wealth and economic power influence political decision-making.” A plutocracy is a form of government where wealth and economic power hold significant influence over political decision-making. In this system, a small group of wealthy individuals or corporations, often known as the plutocrats, control and shape the policies and direction of the country. Their wealth enables them to exert considerable control over the government and manipulate it to serve their own interests and accumulate more wealth. Plutocracies may lead to income inequality and lack of representation for the majority of the population, as economic power dominates political power. The interests of the wealthy elite often take precedence over the needs and welfare of the general populace, leading to potential exploitation and challenges in achieving a fair and just society. (Compare: Lobbying groups.) Leadership: Entertainment Emperor Nicholas Hollywood - Dominates the entertainment industry and cultural narratives. State goals: Estate Inheritance - Ensure the passing down of wealth through family inheritance. / Market Control - Influence and manipulate markets to benefit the wealthiest. Methods: Favor Trading - Engaging in behind-the-scenes deal-making and favor trading. / Access to Information - Controlling access to critical information and data. The citizenry wants: Worker Rights - Fight for labor rights and fair wages for all workers. Complication: Limited Social Services - Inadequate public services due to budget cuts and privatization."

                  "key": "Government",
                  "value": "Patriarchy — “Male dominance prevails and influences power structures.” A patriarchy is a hierarchical social system characterized by male dominance and authority. In such societies, men hold primary power and influence, while women are often relegated to subordinate roles and have limited access to positions of leadership and decision-making. Patriarchal norms and traditions perpetuate gender-based inequalities, leading to the marginalization of women's voices and contributions in various spheres of life. The power dynamics in a patriarchy often reinforce and perpetuate traditional gender roles and stereotypes, impacting not only the distribution of authority but also shaping cultural norms, family structures, and societal expectations. (Compare: Afganistan, United Arab Emirates, India, Russia, Saudi Arabia.) Leadership: King Harold Goldenhelm of Goldenfield - Strongly supports the idea of male authority and control in society. State goals: Combat Gender-Based Violence - Work towards eradicating all forms of violence against men and vulnerable groups. / Promote Female Entrepreneurship - Encourage men's participation in economic activities and business ventures. Methods: Promoting Male Mentorship - Encouraging mentoring relationships between men and younger individuals. / Maintaining Order and Stability - Using patriarchal structures to maintain social cohesion. The citizenry wants: Encouraging Responsible Citizenship - Taking responsibility for one's actions and their impact on society. Complication: Cultural Misunderstandings - The party may encounter difficulties navigating the customs and traditions of a patriarchal society."

    "e_iinyp4n9exfogq": {
      "id": "e_iinyp4n9exfogq",
      "kind": "landmark",
      "name": "Crystal Creek",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Crystal Creek",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "A small cave at the start of river or brook. Inside the cave is small oasis, a waterfall, pool of crisp clear water, and flowering vines crawling up the walls leading to a an opening that lets in sunlight."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "Help us Heroes! – The group comes across an small village that spreads out in a crevace in the wall and stretches for hundreds of feet, but where the ceiling is never more than 4 feet high. This is a village of Myconids that have lived here peacefully ‘since the time of our first spores’ and numbers in the thousands. They beg the party to help them as there is a murdered in the midst. Every day, more and more of their people go missing, and they can’t find the culprit. If they are helped, they will give the party pearls that they collect from nearby shellfish and have saved for years. (The murderer is a kobold with a ring of invisibility and a strange mask to keep from falling to the creatures spores. He REALLY loves cooked mushrooms and has been harvesting the myconids for dinner since finding the village)."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A stairway that has a closing metal door at the top and bottom. The top door is a false door and behind it lies a natural flow of lava. When the top 3 stairs detect any pressure, the top door has panels that open and let in the lava. The bottom door is locked, and panels in the floor at the bottom of the stairs open only after the entire hallway has filled with lava and the top door panels close again."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘None are so blind that they cannot see the darkness of this place. Look not upon the face of the weeping one, Tread not on the bones of mad men.’"
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "The Truth of It",
              "text": "There is a wispy young woman with a 3-month-old baby. She's broke and desperate and haunted and hunted: she was seduced by a nefarious duke, then turned out of the castle while pregnant. She has the baby in a stable and lives on the fringes of a rural community until she finds out that the duke's only son died of the flux right after her baby was born: now she's on the run from both the duke and his still more nefarious uncle. The duke wants the baby to make it his heir; the uncle wants to kill it. She needs protection. The child is in fact the spawn of a duke of hell and is destined to do something unimaginably horrible if it is permitted to live to adulthood. The woman has no idea, believing it's the human duke's baby as does everyone else but the uncle, who's sorted out the truth but of course nobody believes him because they assuming he's lying out of self-interest."
            }
          ],
          "id": "b_yxd472ys"
        }

    "e_7znuf6zxqhmudc": {

      "body": [

          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "Desert of Devouring. Some creature lives here below the sand. When it senses prey on the desert surface, it causes the sand to vibrate. This causes anything on the surface to sink into the sand. Very few desert travelers have managed to escape to tell the tale."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "A barren room with a standing mirror at one end. The mirror is cracked, it appears someone took an axe or sword to it some time ago, but the magical runes around it’s edge still flicker faintly with power."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A map is found on a skeleton wrapped around an old skeleton key. The map shows traps, but all the information is either half right or all wrong. The key is able to open any door in the dungeon, but attracts any undead within 10 miles. Take a hint, maybe the dead guy with the map and key died for a reason."
                },
                {
                  "key": "Scrawled Here",
                  "value": "On the ceiling, ‘Beware of Trappers’"
                }
              ]
            }
          ],
          "id": "b_5f2mr6i7"
        }

    "e_lxdmvc1ke35rx5": {
      "id": "e_lxdmvc1ke35rx5",
      "kind": "building",
      "name": "Discount Magic Goods Store",
      "fields": {
        "keeper": {
          "ref": "e_18tndjqux573f9"
        }
      },
      "body": [
        {
          "type": "statblock",
          "name": "Discount Magic Goods Store",
          "meta": "Fey Bazaar merchant",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Premises",
              "text": "The store is run by an extremely aloof, airheaded wizard. He talks as if he's in a dreamy haze and moves with grand flourishes. If you ask him for a magic item he has it in every size, shape, colour or material you could dream of. Want Boots of Jumping? He's got it. Don't like that one? How about this one? How about this one? Maybe this one? If you ask he assures you yes, they are all Boots of Jumping. And they're all at 75% off too! Artifacts? Oh boy he's got artifacts. He's even got all 30 Eyes of Vecna! The joke is the guy got his hands on a staff that allows him to enchant any item, however he wants, 5 times per day but there's a 95% chance the item's going to become cursed and it puts a drain on his sanity. There's various odds of how badly cursed the items end up being and it's all a gamble for what the players are going to get if they buy anything. The Boots of Jumping could be anywhere from making Mario jump sound effects to making it so you can only move by jumping to making it so you can't jump at all. Always fun to watch the players debate if it's really worth it."
            },
            {
              "type": "list",
              "label": "On the Shelves",
              "items": [
                "Oathbow (2 geases) stock: Only 1, ever | DMG 183",
                "Quiver of Ehlonna (1 geas) stock: Only 1, ever | DMG 189",
                "Glamored studded leather (2 geases) stock: Only 1, ever | DMG 172",
                "Bag of tricks, rust (1 geas) stock: Only 1, ever | DMG 154",
                "Instrument of the bards, Anstruth harp (2 geases) stock: Only 1, ever | DMG 176",
                "Cloak of elvenkind (1 geas) stock: Only 1, ever | DMG 158"
              ]
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Keeper Personality",
                  "value": "I have a much better head for numbers than people."
                },
                {
                  "key": "Ideal",
                  "value": "Finality. No refunds. Ever. (Any)"
                },
                {
                  "key": "Bond",
                  "value": "I'm counting down the days to a peaceful retirement with my spouse or loved ones."
                },
                {
                  "key": "Flaw",
                  "value": "I have no real faith in the quality of my merchandise, whether or not it is actually good."
                }
              ]
            }
          ],
          "id": "b_23vr738o"
        }
      ],

    "e_zeukpf0l7wrubc": {
      "id": "e_zeukpf0l7wrubc",

      "name": "T'zargo's fine wares",
      "fields": {

      },
      "body": [
        {
          "type": "statblock",
          "name": "T'zargo's fine wares",
          "meta": "Weapons merchant",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Premises",
              "text": "This shop can be mysteriously seen in any plane, but always appears as an identical modern convenience store looking building. Inside is a tabaxi named T'zargo, always advertising his 'fine wares at reasonable prices.' He sells extremely rare and powerful items for millions of gold, along with random everyday items. Some of these rare items include an axe once wielded by Baphomet, and draws from a deck of many things. His mundane items he always pulls out of a box on his counter, and they include a full rowboat and 30 chairs."
            },
            {
              "type": "list",
              "label": "On the Shelves",
              "items": [
                "Ammunition, +1 (500gp/20) stock: 44 | DMG 150 Must also pay the cost of the base ammunition",
                "Vicious weapon, any (5,000gp) stock: Only 1, ever | DMG 209 Must also pay the cost of the base weapon",
                "Oathbow (50,000gp) stock: Only 1, ever | DMG 183",
                "Smith's tools (20gp) stock: 2 | PHB 154",
                "Whetstone (1cp) stock: 1 | PHB 150",
                "Martial melee weapons (varies) stock: 14 | PHB 149 Prices are as listed in the PHB"
              ]
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Keeper Personality",
                  "value": "I'll haggle all day, until your ears fall off."
                },
                {
                  "key": "Ideal",
                  "value": "Finality. No refunds. Ever. (Any)"
                },
                {
                  "key": "Bond",
                  "value": "I'm on the run from the law, and plan to leave town before they finally recognize me."
                },
                {
                  "key": "Flaw",
                  "value": "I never, ever, ever know when to quit, and I refuse to lose a sale."
                }
              ]
            }
          ],
          "id": "b_1nn1xbbq"
        }

                {
                  "key": "Keepsake",
                  "value": "A deck of playing cards in which each card has an arbitrarily large number of symbols on it as opposed to the typical 2-10 of each suit. It includes cards like the 28 of clubs, the 132 of spades, and the 69 of diamonds, which has the word “Nice” written in tiny letters at the bottom of the card."

            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "This halfling is glassblower. He lives near the Sea of Swords and his glass globes are used in fishing nets. He marks each one and enjoys it when one is returned to him from far away lands."
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Trying to build a network of shady connections"
            },
            {
              "type": "paragraph",
              "label": "If Asked About Home",
              "text": "Ald Yock- For some inexplicable reason, the denizens of Ald Yock have no knowledge of the outside world. The townsfolk are aware that the outside world exists, of course; however, they show no interest in anything foreign, and quickly forget anyone not a resident of the town. Thus, even someone who comes back again and again every year will be a stranger each time they arrive, with any previous actions attributed to ‘one of you outsiders.’ Unfortunately, this lack of consequence has led many to view the town as a place to act without license; as a result, the townsfolk view visitors with suspicion and distaste."
            }

      "name": "The feud on the square",
      "fields": {},
      "body": [
        {
          "type": "paragraph",
          "id": "b_h04oe92u",

              "text": "Clothing: Tattered and worn · Jewelry: A pair of earrings with glowing moonstone orbs made of steel."

            {
              "type": "keyValue",

                  "key": "Demeanor",

                  "key": "Keepsake",
                  "value": "A medallion that, when focused on, always displays a faint blue line, curving around trees or arching over rocks. It will always show the fastest way home, but not the easiest, a flawed enchantment made by a well-meaning wife For her husband, so that he could always find his way back to her."

              "type": "paragraph",
              "label": "If Asked About Home",
              "text": "Savlok – A town built suspended underneath a large natural stone arch. The upper class live in towers built up the suspension system of the town. The town’s poor live in hovels 200ft down below on the ground floor where waste and broken things are tossed carelessly."

    "e_n5kq5v3eltmb9n": {
      "id": "e_n5kq5v3eltmb9n",
      "kind": "landmark",
      "name": "Chalice Chambers",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Chalice Chambers",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "Veil & Key — A chain of less-than-respectable taverns, concealing an expansive mystery cult. The tiefling proprietors secretly transmit an esoteric wisdom tradition culled from tomes, sacred sites, and communities across the planes. The upper suites, attics, and/or towers of these out-of-the-way establishments are off-limits to all but the approved initiates who bear a very intricate geometric tattoo."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "A barren room with a standing mirror at one end. The mirror is cracked, it appears someone took an axe or sword to it some time ago, but the magical runes around it’s edge still flicker faintly with power."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "Gold melts at a surprisingly low temperature: Did you know that you can melt gold in a candle flame? It would probably take about an hour to do so from room temperature, but you can. More importantly, if you keep your gold coins at a hot enough temperature, they’ll melt very quickly if exposed to a very potent heat source – like say they might melt within seconds if they were doused in lamp oil and lit. This is an interesting thing to note if your chosen method of storing gold coins is in a wire-mesh cage attached to the ceiling. Especially if such a cage is kept at very high temperature, and is trapped with various kinds of flame traps (flame traps that trigger onto the gold). Unfortunately, while the temperature might be relatively high compared to the meltin point of most metal, it’s still more than enough to cook any flesh it comes in contact with (and STICK to that flesh, as molten metal tends to, causing the WORST sort of burns). And of course, the easiest way to get at the gold itself is from directly below it. Be sure to note to the party how hot it is in the room with the gold while they’re standing under it. If they’re clever enough to figure out the trap beforehand, hopefully they’re also clever enough to notice the hidden drains in the floor before all that molten gold runs (very, very quickly) down those drains."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘WHERE IS THE EXIT’"
                }
              ]
            }
          ],
          "id": "b_hqrir8ad"
        }

    "e_w8r6yubvxjspae": {
      "id": "e_w8r6yubvxjspae",
      "kind": "landmark",
      "name": "Stonewall",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Stonewall",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "The Lake of Stars. This lake of pristine water ONLY appears at night, during the day it does not exist. It is so still that it mirrors the billions of stars overhead perfectly. It does not have a single ripple in it, and looks like a literal portal to the cosmos. Seeing such a thing of natural beauty grants inspiration. Note that what this lake mirrors is not merely the stars as we see it, but the cosmos throughout the astral plane as well: you can see passersby from the astral plane by looking into the lake (astral dragons, celestials, godly beings). Beware, for bad luck will haunt those who disturb the lake."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "A dead end – The tunnel the party is walking down has them run headlong into a Giant!! Well, the upper torso of the giant. He’s not hostile and is pinned in place by the surrounding walls as he was chasing dinner down a hole and has wiggled himself into this tunnel, blocking any forward movement. If the party attacks him, he will yell and cry, ‘Stop it, please!’ and be overly pathetic, but with his arms pinned at his sides, they will likely kill him in time (suggest higher hit points than normal so the party has to take their time). If they chat with him, he knows a bit about the surrounding rooms as he’s seen creatures moving through the halls and possibly former adventurers. His name is Gordum, and he’s really hungry as he hasn’t eaten in a very long time. Normally, adventurers take pity on him and feed him while they make their way through the dungeon, but the real reason he stays stuck here is a ring of sustenance that he found years ago and pull on ’cause it was shiny.’ If he’s friendly, he offers to watch over the party while they sleep and promises to warn them if anyone else comes down the hallway."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "A room with a large spiky chandelier covering pretty much the entire ceiling and nothing on the floor or walls. Once the trap is triggered, gravity inverts in the room, dropping the occupants up into the spike trap chandelier. Afterwards, gravity returns to normal and drops them back down the room into the ground, followed shortly thereafter by the Impaldelier."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘Fuck you!’ placed behind a false door with a booby trap rigged to the door. Maybe a explosive/grenade/fire trap or a rockfall trap."
                }
              ]
            }
          ],
          "id": "b_jfrgho7m"
        }
      ],

    "e_ucxll2rcep179o": {
      "id": "e_ucxll2rcep179o",
      "kind": "settlement",
      "name": "Ford Rest",
      "fields": {

      },
      "body": [
        {
          "type": "statblock",
          "name": "Ford Rest",
          "meta": "Town · pop. 3223",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Fearful Atmosphere: Perceived threats to security or civil liberties lead to fear and apprehension among the people."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Tribalism — “Distinct tribes with decentralized power, centered around tribal customs and traditions.” A tribalism government is characterized by a social and political structure centered around distinct tribes or ethnic groups. In this system, power and authority are often concentrated within individual tribes, and governance is influenced by tribal customs, traditions, and leadership. Decision-making is typically decentralized, with each tribe having its own set of rules and leaders. Tribal loyalty is paramount, and conflicts between tribes can arise, leading to a constant struggle for resources, territory, and influence. The government's primary focus is on maintaining the cohesion and well-being of each tribe, which can result in challenges in achieving unified governance and addressing issues that may affect the entire society. (Compare: Native American and Indigenous tribes) Leadership: Hunter Amina of the Plains Clan: Expert tracker and provider of food for the tribe. State goals: Protection from External Threats: Defending the tribe from rival tribes, wild animals, and external forces. / Fertility and Prosperity: Seeking blessings from spirits and ancestors for a fruitful and abundant life. Methods: Collective Decision-Making: Involving all tribe members in important decisions. / Mediation and Peacemaking: Resolving conflicts through mediation and peacemaking efforts. The citizenry wants: Preservation of Cultural Heritage: Preserving and passing down cultural practices, art, and knowledge. Complication: Navigating Tribal Norms: Adhering to tribal customs and protocols can be challenging for outsiders."
                },
                {
                  "key": "Morale",
                  "value": "Patriotic Morale: National pride and unity are prevalent, fostering a strong sense of loyalty towards the country."
                },
                {
                  "key": "Economy",
                  "value": "Command and Control Economy: A system where the government regulates and controls various aspects of the economy. Wealth: Free Market Capitalism: An economic policy promoting minimal government intervention, leading to varying wealth distribution based on individual success. Taxes: Beast Tamer's Levy: A tax on individuals skilled in taming and training magical creatures, supporting the kingdom's menageries. Treasury: Drained: The treasury has been heavily depleted, struggling to meet even essential expenses."
                },
                {
                  "key": "Trade",
                  "value": "Moonstone Carvings: The country's skilled lapidaries craft intricate carvings from moonstones, capturing their lunar essence. Chief export: Titanium Alloy: A strong and lightweight metal, used in crafting cutting-edge weapons and armor. Luxury trade: Phoenix Feather Quills: Feathers from phoenixes that provide unmatched precision and magic control, used by skilled scribes and mages."
                },
                {
                  "key": "Cuisine",
                  "value": "Magical Brews: Enchanted drinks and potions with magical effects, sold by alchemists and esteemed wizards."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Social Unrest: The party encounters civil unrest or social tensions within the population, requiring them to handle delicate situations."
            },
            {
              "type": "paragraph",
              "label": "Behind Closed Doors",
              "text": "Revolutionary Movements: The country secretly supports or funds revolutionary groups in other nations to destabilize them."
            }
          ],
          "id": "b_n9j6qexb"
        }
      ],

    "e_pncvla0bkh0cx2": {
      "id": "e_pncvla0bkh0cx2",
      "kind": "person",
      "name": "Qraf",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Qraf",
          "meta": "Aarakocra · Poet (Arts and Entertainment)",
          "sections": [
            {
              "type": "paragraph",
              "label": "Appearance",
              "text": "Ears: Small · Markings: A displaced scar due to magical teleportation — on the lower arm."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Demeanor",
                  "value": "When calm: Compassionate When stressed: Industrious"
                },
                {
                  "key": "Right Now",
                  "value": "Agitated."
                },
                {
                  "key": "Wants",
                  "value": "Find out a secret."
                },
                {
                  "key": "Flaw",
                  "value": "Is skeptical of everything."
                },
                {
                  "key": "Quirk",
                  "value": "They don't have eyebrows, but instead has tattooed eyebrows slightly too high, which gives a look of permanent surprise."
                },
                {
                  "key": "Faith",
                  "value": "Outspoken cynic."
                },
                {
                  "key": "Keepsake",
                  "value": "A scale model of an island made of trash, music can be faintly heard from the sculpture."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Racial Note",
              "text": "Purely herbivorous"
            },
            {
              "type": "paragraph",
              "label": "Backstory",
              "text": "Charlatan: Blamed a rash of robberies they had committed on an in-city goblin community, giving their enemies a pretense to persecute and exile them, uprooting families that had been living there for generations and turning 'Goblintown' from a thriving community to an urban blight."
            },
            {

    "e_caq8o49zi9wpc6": {

              "text": "Resilient Atmosphere: The country's ability to rebound from challenges and crises fosters a resilient atmosphere."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Democracy — “The voice of the people becomes the force that shapes a nation's destiny.” The archetype of a democratic government is a system in which power is vested in the hands of the people, either directly or through elected representatives. In a democratic government, citizens have the right to participate in decision-making processes, elect leaders, and shape public policies through voting and other forms of political engagement. The fundamental principles of democracy include political equality, individual freedoms, rule of law, protection of human rights, and respect for diverse opinions and perspectives. This archetype promotes government accountability and transparency, fostering a society where the collective will of the people influences the direction of the nation. (Compare: United States, Canada, Australia) Leadership: Isadora Frostwind: A wise and just ice witch elected as the leader of a magical realm, promoting equality among magical beings and non-magical folks. State goals: Cultural Preservation: Valuing and preserving the diverse cultures and traditions that enrich the nation's identity. / Inclusive Governance: Encouraging participation from all segments of society to ensure representation and diverse perspectives. Methods: Budget Allocation: Prioritizing funding for key initiatives aligned with democratic goals. / Legislation: Enacting laws and regulations that align with the goals and values of the democratic government. The citizenry wants: Quality of Life: To have access to basic necessities, healthcare, and a clean environment. Complication: Corruption: The party uncovers signs of corruption within the government, requiring them to expose or confront it."
                },
                {
                  "key": "Morale",
                  "value": "Moderate Morale: The majority of the population feels reasonably satisfied with their lives and the state of the nation."
                },
                {
                  "key": "Economy",
                  "value": "Dragon Hoard Economy: A system centered around the accumulation and trading of dragon treasures, such as rare gems, precious metals, and dragon scales. Wealth: Royal Patronage: A system where the monarch grants wealth and privileges to loyal subjects, resulting in a pyramid-like distribution of wealth. Taxes: Financial Transaction Tax: A tax on financial market transactions, including stock trades and derivatives. Treasury: Depleted: The treasury has been considerably drained, requiring austerity measures and resource management."
                },
                {
                  "key": "Trade",
                  "value": "Dream Crystals: The country mines and exports unique crystals that can be used to access dream realms and visions. Chief export: Unicorn Horns: Horns from unicorns, known for their healing properties and used in the creation of potent healing potions and wands. Luxury trade: Manticore Tail Quivers: Quivers crafted from manticore tails, known for magically replenishing arrows, favored by skilled archers."
                },
                {
                  "key": "Cuisine",
                  "value": "Arcane Confections: Magical sweets and desserts crafted by skilled wizards, infused with arcane energy."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Exclusion of the Unskilled - The party might uncover marginalized individuals struggling to find a place in the meritocracy due to lack of opportunities."
            }

              "text": "Polarized Atmosphere: Deep divisions and ideological differences result in a highly polarized and contentious society."

              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Magocracy — “The wielders of magic reign supreme, shaping the fate of the nation with their mystical might.” The archetype of a magocracy is a form of government where magic-users, such as wizards, sorcerers, or other spellcasters, hold dominant political power. In a magocracy, magical prowess and knowledge are highly valued, and those with exceptional magical abilities often rule over non-magical citizens. Magic is not only a means of governing but also a foundation of the society, influencing laws, culture, and even daily life. The ruling class of magicians may form a council or a single all-powerful Archmage, wielding their mystical abilities to control the nation and maintain order. However, this concentration of magical power can lead to tensions and conflicts with those who lack magical abilities, and strict rules and regulations may be enforced to prevent the misuse of magic or potential rebellions among the non-magical populace. The magocracy's success and stability hinge on the responsible and benevolent use of magic and the ability to strike a delicate balance between magical and non-magical citizens' interests. (Compare: Hogwarts, the Somnovum) Leadership: Court Sorceress Seraphina Sunfire - Advisor to the royal family, Court Sorceress Seraphina weaves powerful spells of protection and wards to safeguard the kingdom from threats. State goals: Magical Education - A goal to provide comprehensive magical education to citizens, fostering skilled wizards, sorcerers, and magic practitioners to bolster the nation's might. / Magical Defense - Aiming to develop potent magical defenses to protect the magocracy from external and internal threats with intricate wards, barriers, and counter-spells. Methods: Magical Ethics Committees - Establishing ethics committees to oversee and guide responsible magical practices. / Public-Private Magecraft Initiatives - Encouraging public-private partnerships to boost magecraft entrepreneurship. The citizenry wants: Protection from Dark Magic - Aspiring to live in a society safeguarded from the influence of dark magic and malevolent sorcery. Complication: Restricted Arcane Knowledge - Access to certain magical knowledge or resources may be limited, hindering the party's progress in their quest."

                  "value": "Anxious Morale: Widespread uncertainty and concerns about the future contribute to anxious sentiments."

                {
                  "key": "Economy",
                  "value": "Beast Tamer's Trade: An economy shaped by skilled beast tamers who capture and train magical creatures for various purposes, such as companionship and battle. Wealth: Wealthy Elite: An economic structure that concentrates wealth in the hands of a powerful and privileged elite, leading to a significant wealth gap. Taxes: Inheritance Tax: A tax on the value of assets transferred to heirs after a person's death, aiming to reduce wealth inequality. Treasury: Enriched: The treasury is consistently augmented through astute economic management, fostering growth and prosperity."
                },
                {
                  "key": "Trade",
                  "value": "Shadow Silk: Known for its unique spiders that weave shadow silk, the country exports this dark and mysterious fabric. Chief export: Sylvan Bark: Bark from the sacred sylvan trees, used in elven rituals and as a component in powerful spells. Luxury trade: Mermaid Scale Fabric: A glistening and iridescent fabric made from mermaid scales, used in crafting luxurious clothing and accessories."

              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Puppet — “A facade of power, controlled by external strings.” A puppet government is a form of governance where the real decision-making power lies with external forces or individuals, while the visible leaders in the government merely serve as figureheads or puppets. In this arrangement, the puppet government appears to have autonomy, but it is heavily influenced or controlled by an external entity, often a more powerful country or organization. The external force manipulates the puppet government to implement policies and actions that align with their interests, disregarding the true aspirations and welfare of the governed population. Puppet governments are essentially tools used by external actors to exert their influence and maintain control over a region without taking direct responsibility for their actions (Compare: North Korea (as a puppet state of China), Iraq (puppet of the US after invasion)) Leadership: The Consortium of Merchants - Wealthy and influential merchants shaping political decisions. State goals: Exploit Internal Divisions - Manipulate existing divisions to maintain control and weaken potential opposition. / Undermine Independent Institutions - Weaken any institutions that could challenge the puppet government's authority. Methods: Infiltration & Blackmail - Planting agents within opposing groups and using compromising information to control them. / Intimidation & Repression - Using force and intimidation to silence dissent and maintain order. The citizenry wants: Reclaim National Sovereignty - A longing for genuine control and independence, unaware of puppet government manipulation. Complication: Tainted Legal System - The legal system may be compromised, making it hard to find justice or prove innocence."

                  "value": "Low Morale: The population is generally unhappy, frustrated, and lacks confidence in the government's abilities."

                  "key": "Economy",
                  "value": "Mystic Auction House: An enigmatic economy held within hidden auction houses, trading unique relics, enchanted paintings, and mysterious artifacts. Wealth: Mercantile Oligarchy: An economic structure dominated by merchant families, leading to a concentration of wealth and commercial power. Taxes: Flat Tax: A uniform tax rate applied to all income levels, promoting simplicity and fairness. Treasury: Depleted: The treasury has been considerably drained, requiring austerity measures and resource management."

              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Feudalism — “A hierarchical system of governance based on land ownership, loyalty, and reciprocal obligations between rulers and vassals.” The archetype of a feudalistic government is a hierarchical system of rule based on a decentralized structure of land ownership and loyalty. In a feudalistic government, the ruler grants land, known as fiefs, to vassals in exchange for military service and loyalty. The vassals, in turn, pledge their allegiance and provide military support to the ruler. This creates a pyramid-like structure of power, where the ruler sits at the top, and beneath them are various levels of vassals, each with their own vassals beneath them, forming a complex web of feudal relationships. Feudalistic governments are characterized by a strong emphasis on personal loyalty, obligations, and reciprocal relationships between the ruler and their vassals. The ruler retains the ultimate authority and is responsible for maintaining order and justice within their realm. The system relies on the control of land, which provides economic power and resources to both the ruler and the vassals. (Compare: Medieval Europe) Leadership: Baron Frederick - Stoic and honorable nobleman fiercely loyal to his liege and committed to upholding the code of chivalry. State goals: Ensuring Monarchial Stability: Maintaining the authority and stability of the ruling monarch or noble houses. / Empowering Education and Knowledge: Fostering education and knowledge to empower the ruling class and the populace. Methods: Feudal Hierarchy and Obligations - Maintain a structured hierarchy where vassals owe loyalty and service to higher-ranking nobles. / Noble Patronage and Favors - Grant privileges and favors to loyal vassals and supporters. The citizenry wants: Seeking Noble Patronage and Protection - Gain favor and support from noble patrons for status and security. Complication: Feudal Oaths and Vows - Struggling with oaths and vows of loyalty to conflicting lords."
                },
                {
                  "key": "Morale",
                  "value": "Patriotic Morale: National pride and unity are prevalent, fostering a strong sense of loyalty towards the country."
                },
                {
                  "key": "Economy",
                  "value": "Enchanted Garden Economy: A mystical economy based around rare herbs, magical plants, and alchemical concoctions found in enchanted gardens. Wealth: Progressive Taxation: A policy that imposes higher taxes on the wealthy to fund social programs and reduce income inequality. Taxes: Spellcaster Guild Tax: Collecting taxes from members of official spellcaster guilds or organizations. Treasury: Struggling: The treasury is facing financial struggles, resulting in a lack of funds for vital services."
                },
                {
                  "key": "Trade",
                  "value": "Elemental Essences: The nation harnesses and exports elemental essences used in spellcasting and magical experiments. Chief export: Drakefire Ember: Embers from the breath of fire drakes, used in forging weapons that can unleash fiery devastation. Luxury trade: Artisan Crafts: Handcrafted and artistic works created by skilled artisans, valued for their craftsmanship and uniqueness."
                },
                {
                  "key": "Cuisine",
                  "value": "Sphinx's Enigmas: Intriguing and enigmatic dishes served with riddles and puzzles to stimulate the mind and palate."

he influence of dark magic and malevolent sorcery. Complication: Cultural Prejudices against Non-Mages - Non-magical party members might face discrimination or distrust in a society that heavily values magic."

              "pairs": [
                {
                  "key": "Government",
                  "value": "Bureaucracy — “Complex structures, hierarchies, and rules govern. Decisions and policies are made based on established procedures and regulations, rather than relying solely on the whims of individual leaders.” A bureaucratic government is characterized by its intricate administrative structure, extensive hierarchies, and a plethora of rules that govern its operations. Within this system, decisions and policies are meticulously made following established procedures and regulations rather than being subject to the whims of individual leaders. The government functions through various levels of authority, each assigned specific roles and responsibilities. Standardized procedures, formal written communication, and a merit-based approach to appointments and promotions contribute to its impartiality and stability. However, the bureaucracy's reliance on rules and red tape may lead to inefficiencies and resistance to change. Despite its aim to ensure fairness and consistency, critics often point out limited accountability and departmental silos that can hinder responsiveness and transparency. The bureaucratic government strives to maintain order and continuity, providing citizens with a sense of structure and predictability in governance. (Compare: Modern Germany, Japan, France) Leadership: Grand Enchanter Calista Nightshade - Chief Mage of the Arcane Council, a formidable sorceress known for her strict adherence to magical regulations. State goals: Cultural Preservation: To safeguard the nation's cultural heritage, history, and traditions, ensuring they are cherished and passed down to future generations. / Emigration and Resettlement: To manage emigration and resettlement programs, offering opportunities for citizens to settle in new territories or regions. Methods: Resource Allocation: Distributing resources and funding according to government priorities and societal needs. / Public-Private Partnerships: Collaborating with private businesses or guilds to achieve shared objectives. The citizenry wants: Preservation of Culture: To preserve and celebrate cultural heritage and traditions within bureaucratic policies. Complication: Government Rivals: The adventurers might find themselves entangled in political rivalries and power struggles between different bureaucratic factions, affecting their support and resources."

    "e_4ec5a1yiflzu6f": {
      "id": "e_4ec5a1yiflzu6f",
      "kind": "landmark",
      "name": "Gatehaven",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Gatehaven",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "A pair of stone legs and a shattered face rest on the dunes. On the pedestal half worn away by grit and time is etched the name of a tyrant long forgotten and a hollow boast: “Behold what I have wrought, and weep…” Nothing beside remains. Around the decay of that colossal wreck, boundless and bare, the lone and level sands stretch far away."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "An eternal campfire burns in this room. The adventurers shadows appear on the dungeon wall, which turn into Shadows from the Monster Manual. The taller the adventurer, the more powerful the Shadow will be. The fire can only be put out by dousing it with holy water or some other curse removal."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",

    "e_rrxd8rq6ntm83x": {
      "id": "e_rrxd8rq6ntm83x",
      "kind": "landmark",
      "name": "Travertine Town",
      "fields": {},
      "body": [
        {
          "type": "statblock",
          "name": "Travertine Town",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "Curci’s Crypt – A small white stone structure deep in the woods with carvings of trees on each side. Entering brings you into the hidden crypt of Curci."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "A broken down wall of the dungeon leads to a decently sized cave where five cow like animals with purple spots and luminescent horns are grinding their teeth against the stone walls to get the lichen growing inside this crumbling tunnel. If approached slowly they will ignore the PCs, but if the PCs get too close the biggest one will turn towards you and snort while the others run back into the tunnels. If the PCs continue to approach it will attempt to gore one of the PCs with its poisonous horns and will then gallop after its compatriots."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "This is a standard pit-trap with a twist. At the bottom of the pit, and for ten feet up the walls, everything is coated in pitch. Pitch may be sticky, but in quantity it also acts like any other oil-based liquid – a lubricant. Climbing up a rope becomes extremely unlikely for whoever fell down the hole. But that’s not the worst bit. A couple of rounds after the pit trap is activated, the Kobolds, warned by a bell attached to the pit trap’s trigger, will show up with lit torches. And one of them will start combat by throwing a torch into the pit – igniting the pitch!"
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘Kobold Pride’ in draconic."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "The Truth of It",
              "text": "The local lord with the bandit problem? He's actually been on the bandits' side all along, and has successfully fooled his subjects this whole time."
            }
          ],
          "id": "b_ygfbon7m"
        }
      ],

          "type": "statblock",
          "name": "The Magic Items Shop",
          "meta": "Magic Items merchant",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Premises",
              "text": "Subtle slave trader. The ‘products’ are actually transformed into animals or trinkets. Upon purchase, the trader will give the new owner a scroll or item to transform the trinket into the slave (maybe even back again). A clever way to smuggle slaves through check points and/or through lands that don’t support slavery."
            },
            {
              "type": "list",
              "label": "On the Shelves",
              "items": [
                "Figurine of wondrous power, onyx dog (5,000gp) stock: Only 1, ever | DMG 170",
                "Bag of tricks, grey (500gp) stock: Only 1, ever | DMG 154",
                "Dust of dryness (250gp) stock: Only 0, ever | DMG 166",
                "Wand of wonder (5,000gp) stock: Only 1, ever | DMG 212",
                "Bag of beans (5,000gp) stock: Only 1, ever | DMG 152",
                "Ring of the ram (5,000gp) stock: Only 1, ever | DMG 197"

            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Keeper Personality",
                  "value": "I'll haggle all day, until your ears fall off."
                },
                {
                  "key": "Ideal",
                  "value": "Monopoly. Undercutting my rivals and price gouging are the only ways to get ahead. (Evil)"
                },
                {
                  "key": "Bond",
                  "value": "I'm counting down the days to a peaceful retirement with my spouse or loved ones."
                },
                {
                  "key": "Flaw",
                  "value": "If someone undercuts my prices, I'll cut their throat."
                }
              ]

      "kind": "note",
      "name": "The feud on the square",

          "type": "paragraph",
          "id": "b_y5wyh5qo",

              "text": "Face: A large mole · Markings: a figure tattoo (Skillfully executed work) depicting: mercenary — on the face starting from the corner of their mouth to the edge of their eye."
            },

              "type": "keyValue",

                  "key": "Demeanor",

                  "key": "Right Now",

                {
                  "key": "Fears",
                  "value": "being trapped in a cursed cave"
                },
                {
                  "key": "Flaw",
                  "value": "Has a short temper."
                },
                {
                  "key": "Quirk",
                  "value": "Before asking a question you say “more inquiry needed,” you also end conversations with “conversation over”."

                {
                  "key": "Faith",

          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "A geometrically-shaped part of the forest that is a literal desert, including climate and all. that part of the forest functions on its own."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "A room lined with standing alcoves. The alcoves are inhabited by a body encased in (magical) crystal. A knowledge history check can date the bodies to various eras of history. Near a collection of empty alcoves is a body bearing an item of only recent styling, invention, or popularity."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "Three chests sit in a room. A sign on the wall reads “DANGER! MIMIC!” There is no mimic, but there is a rug of smothering under each chest."
                },
                {
                  "key": "Scrawled Here",
                  "value": "Bloody scrawled writing say ‘The secret chamber has been opened.’"
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "The Truth of It",
              "text": "The hag's cabin is where her power comes from. It corrupts those inside, luring them to become the next owner of the cabin."
            }

      "body": [
        {
          "type": "statblock",
          "name": "Templehaven",
          "meta": "Town · pop. 1242",
          "sections": [
            {
              "type": "paragraph",
              "label": "At First Glance",
              "text": "Progressive Atmosphere: The government's progressive reforms and forward-thinking vision cultivate a progressive atmosphere."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Government",
                  "value": "Republic — “Power is vested in elected representatives who act on behalf of the citizens.” A republic government is a form of governance in which the state's authority is derived from its citizens, who elect representatives to make decisions on their behalf. In a republic, the power is not concentrated in the hands of a single ruler or a small group of elites, but instead, it is dispersed among the elected officials and institutions. The fundamental principles of a republic often include the rule of law, individual rights and freedoms, and the separation of powers between the legislative, executive, and judicial branches. This form of government is designed to promote the common good, protect the rights of its citizens, and foster a system of checks and balances to prevent the abuse of power. Additionally, a republic encourages political participation and accountability, as citizens have the opportunity to vote and participate in the decision-making process through elections and other democratic mechanisms. (Compare: United states, Germany, India, Brazil, and France) Leadership: Chief Diplomat David Lee: Oversees foreign relations and represents the country internationally. State goals: Maintain Diplomatic Relations: Foster peaceful relationships with other nations and promote international cooperation. / Maintain Rule of Law: Ensure that laws are justly applied and enforced, promoting a stable society. Methods: Public-Private Partnerships: The government collaborates with private entities to implement projects and provide services effectively. / Public-Private Partnerships: The government collaborates with private entities to implement projects and provide services effectively. The citizenry wants: Protect Consumer Rights: Citizens seek protection from fraudulent practices and unfair treatment as consumers. Complication: Public Opinion Swings: The party must adapt to changes in public opinion, which can influence government policies and decisions."
                },
                {
                  "key": "Morale",
                  "value": "Indignant Morale: Frustration and anger towards perceived injustices drive the people's sentiment."
                },
                {
                  "key": "Economy",
                  "value": "Command and Control Economy: A system where the government regulates and controls various aspects of the economy. Wealth: Magic Trade Hierarchies: A system where powerful spellcasters control the magical trade, accumulating significant wealth through spell services and artifacts. Taxes: Magical Essence Toll: A tax on the use of magical energy and essences, channeled into enchantments and spells. Treasury: Dire: The treasury is in a critical condition, with the country facing imminent financial ruin."
                },
                {
                  "key": "Trade",
                  "value": "Elven Crafts: The nation's elven artisans create elegant and ethereal crafts that are highly sought after worldwide. Chief export: Nymph Tears: Tears shed by nymphs, used in creating potions that enhance beauty and enchantment spells. Luxury trade: Enchanted Items: Magical items imbued with mystical properties, highly sought after by spellcasters and adventurers."
                },
                {
                  "key": "Cuisine",
                  "value": "Ent's Bounty: Nutritious and wholesome dishes made from the bountiful produce of ancient ents and treants."
                }
              ]
            },
            {
              "type": "paragraph",
              "label": "Trouble Brewing",
              "text": "Propaganda Manipulation - Be aware of the manipulation of information and perception."
            },
            {
              "type": "paragraph",
              "label": "Behind Closed Doors",
              "text": "Refugee Assistance: The country offers refuge and assistance to refugees fleeing conflict or persecution."
            }
          ],
          "id": "b_w8i9331d"
        }

                  "key": "Government",
                  "value": "Tribalism — “Distinct tribes with decentralized power, centered around tribal customs and traditions.” A tribalism government is characterized by a social and political structure centered around distinct tribes or ethnic groups. In this system, power and authority are often concentrated within individual tribes, and governance is influenced by tribal customs, traditions, and leadership. Decision-making is typically decentralized, with each tribe having its own set of rules and leaders. Tribal loyalty is paramount, and conflicts between tribes can arise, leading to a constant struggle for resources, territory, and influence. The government's primary focus is on maintaining the cohesion and well-being of each tribe, which can result in challenges in achieving unified governance and addressing issues that may affect the entire society. (Compare: Native American and Indigenous tribes) Leadership: Warrior Chuma of the Mountain Tribe: Fearless and skilled warrior, entrusted with defending the tribe. State goals: Sustainable Resource Management: Ensuring responsible use of natural resources to maintain ecological balance. / Cultural Preservation: Safeguarding the tribe's traditions, customs, and oral history for future generations. Methods: Hunter-Gatherer Strategies: Developing efficient strategies for hunting and gathering resources. / Mediation and Peacemaking: Resolving conflicts through mediation and peacemaking efforts. The citizenry wants: Protection of Tribe's Territory: Safeguarding the land and resources that belong to the tribe. Complication: Tribal Traditions: Upholding tribal customs may require the party to adapt to new practices."

                  "key": "Government",
                  "value": "Bureaucracy — “Complex structures, hierarchies, and rules govern. Decisions and policies are made based on established procedures and regulations, rather than relying solely on the whims of individual leaders.” A bureaucratic government is characterized by its intricate administrative structure, extensive hierarchies, and a plethora of rules that govern its operations. Within this system, decisions and policies are meticulously made following established procedures and regulations rather than being subject to the whims of individual leaders. The government functions through various levels of authority, each assigned specific roles and responsibilities. Standardized procedures, formal written communication, and a merit-based approach to appointments and promotions contribute to its impartiality and stability. However, the bureaucracy's reliance on rules and red tape may lead to inefficiencies and resistance to change. Despite its aim to ensure fairness and consistency, critics often point out limited accountability and departmental silos that can hinder responsiveness and transparency. The bureaucratic government strives to maintain order and continuity, providing citizens with a sense of structure and predictability in governance. (Compare: Modern Germany, Japan, France) Leadership: Minister of Agriculture Briarwood Greenleaf - A gentle and wise druid responsible for overseeing agricultural policies and ensuring the harmony between nature and civilization. State goals: Magical Regulation: To control and monitor the use of magic within the kingdom, preventing misuse and protecting against dangerous magical entities. / Efficient Administration: To streamline administrative processes and ensure the smooth functioning of government operations and public services. Methods: Public Works Programs: Implementing employment-generating projects to stimulate the economy and improve public infrastructure. / Citizen Engagement Platforms: Establishing platforms for citizens to voice their opinions and contribute ideas for governance and policy-making. The citizenry wants: Protection from Overreach: To safeguard against bureaucratic overreach and excessive regulations. Complication: Bureaucratic Hierarchy: The adventurers must navigate a complex hierarchy of bureaucratic departments, each with its own set of regulations and authorities, to achieve their objectives."

        {
          "type": "statblock",
          "name": "Snowbourne",
          "meta": "Landmark",
          "sections": [
            {
              "type": "paragraph",
              "label": "The Site",
              "text": "Two gnomes sitting next to each other, singing in a language no one can understand. The language is made up, and the gnomes will not pay attention to you until you speak gibberish at them."
            },
            {
              "type": "paragraph",
              "label": "Within",
              "text": "The dungeon is very cramped, smaller than usual hallways, doors just tall enough to fit through, etc. At the bottom of the dungeon is a large, cavernous chamber containing an enormous monster. Upon inspection, the chamber appears to be a sort of colosseum. The monster may be dead, undead, or alive, and may be immediately aggressive, or just want a friend. It has no understanding of how it got there."
            },
            {
              "type": "keyValue",
              "pairs": [
                {
                  "key": "Hazard",
                  "value": "While travelling to a popular location or city on a path that is obscured (such as forest or cave), the party hears cries of help from a woman. These cries emanate from a hidden kenku group that ambush the party when they approach the voice."
                },
                {
                  "key": "Scrawled Here",
                  "value": "‘It sees NO EYES’"

              "label": "The Truth of It",
