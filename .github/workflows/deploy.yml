name: Deploy v2 to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'v2/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: v2/package-lock.json
      - name: Install
        working-directory: v2
        run: npm ci
      # main IS production — a failed gate stops the deploy, so a bad push
      # (or two sessions' combined tree going red) never reaches the live site.
      - name: Gate (check + validate + smoke)
        working-directory: v2
        run: npm run gate
      - name: Build
        working-directory: v2
        run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: v2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
