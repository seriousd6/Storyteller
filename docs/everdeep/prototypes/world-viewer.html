<style>
  :root { --bg:#14171d; --panel:#1c2129; --line:#333b48; --ink:#e8e4d8; --dim:#9aa3b2;
          --gold:#ffd479; --link:#8fb8e8; --secret:#c98a8a; }
  * { box-sizing:border-box; }
  body { margin:0; height:100vh; display:flex; flex-direction:column; background:var(--bg);
         color:var(--ink); font:15px/1.55 Georgia, 'Times New Roman', serif; }
  header { display:flex; align-items:center; gap:14px; padding:10px 16px; background:var(--panel);
           border-bottom:1px solid var(--line); font-family:system-ui, sans-serif; }
  header h1 { font-size:15px; margin:0; } header .sub { color:var(--dim); font-size:12px; }
  header label { margin-left:auto; font-size:13px; display:flex; gap:6px; align-items:center; cursor:pointer; }
  main { flex:1; display:flex; min-height:0; }
  nav { width:270px; overflow:auto; background:var(--panel); border-right:1px solid var(--line);
        padding:10px 8px; font-family:system-ui, sans-serif; font-size:13.5px; }
  nav .node { padding:2px 6px; border-radius:5px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  nav .node:hover { background:#252c37; }
  nav .node.active { background:#2c3542; color:var(--gold); }
  nav .kids { margin-left:14px; border-left:1px solid var(--line); padding-left:6px; }
  nav .dead { color:var(--dim); text-decoration:line-through; }
  article { flex:1; overflow:auto; padding:28px 40px 80px; max-width:860px; }
  .crumbs { font-family:system-ui, sans-serif; font-size:12.5px; color:var(--dim); margin-bottom:6px; }
  .crumbs a { color:var(--dim); }
  .kindchip { font-family:system-ui, sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
              color:var(--gold); border:1px solid #55492c; border-radius:10px; padding:1px 9px; vertical-align:3px; margin-left:10px; }
  h2.title { font-size:30px; margin:2px 0 2px; color:var(--gold); font-weight:normal; }
  .aliases { color:var(--dim); font-style:italic; margin-bottom:12px; }
  .tags span { font-family:system-ui,sans-serif; font-size:11px; background:#252c37; border-radius:9px; padding:1px 8px; margin-right:5px; color:var(--dim); }
  section { margin-top:20px; }
  section > h3 { font-family:system-ui, sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:.1em;
                 color:var(--dim); border-bottom:1px solid var(--line); padding-bottom:4px; }
  dl.fields { display:grid; grid-template-columns:max-content 1fr; gap:4px 18px; margin:8px 0; }
  dl.fields dt { color:var(--dim); font-family:system-ui,sans-serif; font-size:13px; padding-top:2px; }
  dl.fields dd { margin:0; }
  a { color:var(--link); text-decoration:none; border-bottom:1px dotted #4a6584; }
  a:hover { border-bottom-style:solid; }
  .block { margin:10px 0; }
  .block .label { font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
  .block.secret { border-left:3px solid var(--secret); padding:6px 12px; background:#241c1c; border-radius:0 6px 6px 0; }
  .block.secret .label { color:var(--secret); }
  .statb { border:1px solid #55492c; border-radius:6px; padding:10px 14px; background:#1e1a12; }
  .statb .sbname { color:var(--gold); font-variant:small-caps; font-size:18px; }
  ul.rel, ul.backs { padding-left:18px; margin:8px 0; }
  .ghostnote { font-family:system-ui,sans-serif; font-size:12.5px; color:var(--dim); font-style:italic; }
  .provenance { font-family:ui-monospace, monospace; font-size:11.5px; color:#6b7686; margin-top:26px;
                border-top:1px dashed var(--line); padding-top:8px; }
  canvas.floor { background:#101216; border:1px solid var(--line); border-radius:4px; margin:6px 10px 6px 0; }
  .floors { display:flex; flex-wrap:wrap; align-items:flex-start; }
  .floorbox { font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); }
  .empty { color:var(--dim); font-style:italic; }
  .conflict { font-family:system-ui,sans-serif; font-size:12.5px; color:#d8b46a; background:#242015;
              border:1px solid #55492c; border-radius:6px; padding:8px 12px; margin-top:10px; }
  .playerhide { display:none !important; }
</style>

const E = WORLD.entities;
const kids = {};
for (const e of Object.values(E)) {
  const p = e.parentId ?? '__root__';
  (kids[p] ??= []).push(e.id);
}
let current = null, playerView = false;

// ---------- backlinks index ----------
const mentionRe = /\{@e (e_[a-z0-9]{14})(?:\|([^}]*))?\}/g;
const backlinks = {};
for (const e of Object.values(E)) {
  const refs = new Set();
  for (const b of e.body ?? []) for (const m of String(b.text ?? '').matchAll(mentionRe)) refs.add(m[1]);
  for (const v of Object.values(e.fields ?? {})) if (v && typeof v === 'object' && v.ref) refs.add(v.ref);
  for (const r of e.relations ?? []) refs.add(r.target);
  for (const t of refs) (backlinks[t] ??= []).push(e.id);
}

const ICONS = { world:'🌍', region:'🗺️', biome:'🌲', settlement:'🏘️', district:'🏙️', building:'🏠',
                person:'👤', faction:'🛡️', landmark:'🏛️', item:'🗝️', quest:'❗', event:'⚔️', note:'📝' };
const icon = e => ICONS[e.kind] ?? '▪️';
const link = (id, label) => E[id]
  ? `<a href="#${id}" data-id="${id}">${label ?? E[id].name}</a>` : (label ?? id);
const renderText = t => String(t).replace(mentionRe, (_, id, label) => link(id, label));

// ---------- tree ----------
function renderTree() {
  const nav = document.getElementById('tree');
  const item = id => {
    const e = E[id];
    if (e.deleted && playerView) return '';
    const cls = ['node', id === current ? 'active' : '', e.deleted ? 'dead' : ''].join(' ');
    let html = `<div class="${cls}" data-id="${id}">${icon(e)} ${e.name}</div>`;
    const c = (kids[id] ?? []).filter(k => !(E[k].deleted && playerView));
    if (c.length) html += `<div class="kids">${c.map(item).join('')}</div>`;
    return html;
  };
  nav.innerHTML = (kids['__root__'] ?? []).map(item).join('');
}

// ---------- sites ----------
function sitesFor(id) {
  const out = [];
  for (const p of WORLD.planes ?? []) for (const s of p.sites ?? []) if (s.entityId === id) out.push({ plane: p, site: s });
  return out;
}
function drawFloor(canvas, floor) {
  const cs = Math.max(3, Math.min(10, Math.floor(300 / Math.max(floor.w, floor.h))));
  canvas.width = floor.w * cs + 1; canvas.height = floor.h * cs + 1;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#232833'; ctx.lineWidth = 1;
  for (let x = 0; x <= floor.w; x++) { ctx.beginPath(); ctx.moveTo(x*cs+.5, 0); ctx.lineTo(x*cs+.5, floor.h*cs); ctx.stroke(); }
  for (let y = 0; y <= floor.h; y++) { ctx.beginPath(); ctx.moveTo(0, y*cs+.5); ctx.lineTo(floor.w*cs, y*cs+.5); ctx.stroke(); }
  const colors = { floor:'#b7a98c', wall:'#4a4436', door:'#c98a3f', stairs:'#8fb8e8', water:'#2c4a6b', hazard:'#c96a6a' };
  for (const [addr, cell] of Object.entries(floor.cells ?? {})) {
    const [x, y] = addr.split(',').map(Number);
    ctx.fillStyle = colors[cell.t] ?? '#b7a98c';
    ctx.fillRect(x*cs+1, y*cs+1, cs-1, cs-1);
    if (cell.entityId) {
      ctx.strokeStyle = '#ffd479'; ctx.lineWidth = 2;
      ctx.strokeRect(x*cs+1.5, y*cs+1.5, cs-2, cs-2);
    }
  }
}

// ---------- page ----------
function fieldVal(v) {
  if (v && typeof v === 'object' && v.ref) return link(v.ref);
  if (v && typeof v === 'object' && v.date) return v.date;
  if (Array.isArray(v)) return v.join(', ');
  return renderText(v);
}
function renderPage() {
  const art = document.getElementById('page');
  if (!current || !E[current]) {
    art.innerHTML = `<h2 class="title">Vessia</h2>
      <p>A ten-entity fixture world. Pick a page from the tree — blue links are <code>{@e}</code> mentions
      resolved from the JSON; the gold-edged cell in a site map is a placed entity (the Barrow Key in the
      cellar, Sceolan in the dungeon). Toggle <b>Player View</b> to see the secrecy model work.</p>
      <p class="ghostnote">Terrain rendering lives in the other prototype (hex-zoom.html); this viewer shows
      the wiki + sites side of the same schemas.</p>`;
    return;
  }
  const e = E[current];
  // breadcrumbs
  const chain = []; let p = e.parentId;
  while (p && E[p]) { chain.unshift(link(p)); p = E[p].parentId; }
  let html = `<div class="crumbs">${chain.length ? chain.join(' › ') + ' ›' : 'Vessia'}</div>`;
  html += `<h2 class="title">${icon(e)} ${e.name}<span class="kindchip">${e.kind}${e.deleted ? ' · deleted' : ''}</span></h2>`;
  if (e.aliases?.length) html += `<div class="aliases">also called ${e.aliases.join(', ')}</div>`;
  if (e.tags?.length) html += `<div class="tags">${e.tags.map(t => `<span>${t}</span>`).join('')}</div>`;

  if (Object.keys(e.fields ?? {}).length) {
    html += `<section><h3>Details</h3><dl class="fields">` +
      Object.entries(e.fields).map(([k, v]) => `<dt>${k}</dt><dd>${fieldVal(v)}</dd>`).join('') + `</dl></section>`;
  }
  if (e.body?.length) {
    html += `<section><h3>Entry</h3>` + e.body.map(b => {
      const secret = (e.secretBlocks ?? []).includes(b.id);
      const cls = `block${secret ? ' secret' : ''}${secret && playerView ? ' playerhide' : ''}`;
      if (b.type === 'statblock') return `<div class="${cls}"><div class="statb"><div class="sbname">${b.name ?? ''}</div></div></div>`;
      const label = b.label ?? (secret ? 'Secret' : '');
      return `<div class="${cls}">${label ? `<div class="label">${label}</div>` : ''}${renderText(b.text ?? '')}</div>`;
    }).join('') + `</section>`;
  }
  if (e.relations?.length) {
    html += `<section><h3>Relations</h3><ul class="rel">` +
      e.relations.map(r => `<li>${r.type} → ${link(r.target)}</li>`).join('') + `</ul></section>`;
  }
  const backs = (backlinks[current] ?? []).filter(id => id !== current);
  if (backs.length) {
    html += `<section><h3>Referenced by</h3><ul class="backs">` +
      backs.map(id => `<li>${icon(E[id])} ${link(id)}</li>`).join('') + `</ul></section>`;
  }
  const sites = sitesFor(current);
  if (sites.length) {
    html += `<section><h3>Site maps</h3><div class="floors">` +
      sites.flatMap(({ site }) => site.floors.map((f, i) =>
        `<div class="floorbox"><canvas class="floor" data-site="${site.id}" data-floor="${i}"></canvas>
         <div>${f.label} — ${f.w}×${f.h} @ ${site.cellFt} ft${Object.values(f.cells ?? {}).some(c => c.entityId)
           ? ' · ' + Object.values(f.cells).filter(c => c.entityId).map(c => link(c.entityId)).join(', ') + ' placed here' : ''}</div></div>`
      )).join('') + `</div></section>`;
  }
  if (e.ghostState) {
    const g = e.ghostState;
    html += `<section><h3>Unwritten</h3><div class="ghostnote">` +
      `In the app, ghost suggestions render here (this page has ${Object.keys(g.rerolls ?? {}).length} rerolled slot(s)` +
      `${g.dismissed?.length ? `, ${g.dismissed.length} dismissed` : ''} in its ghostState).</div></section>`;
  }
  if (!playerView && e.gen) {
    html += `<div class="provenance">generated by ${e.gen.generator}` +
      `${e.gen.role ? ` · role “${e.gen.role}” of ${e.gen.plan}` : ''}<br>seed ${e.gen.seed}` +
      `${e.gen.overrides?.length ? `<br>kept by hand: ${e.gen.overrides.join(', ')}` : ''}</div>`;
  }
  if (!playerView) {
    const conf = (WORLD.conflicts ?? []).filter(c => c.entityId === current);
    for (const c of conf) html += `<div class="conflict">⚠ sync conflict inbox: a copy of this page lost a merge at ${c.at} — kept for review, never silently dropped.</div>`;
  }
  art.innerHTML = html;
  art.querySelectorAll('canvas.floor').forEach(cv => {
    const site = WORLD.planes.flatMap(p => p.sites ?? []).find(s => s.id === cv.dataset.site);
    drawFloor(cv, site.floors[Number(cv.dataset.floor)]);
  });
}

function navigate(id) { current = id; renderTree(); renderPage(); }
document.addEventListener('click', ev => {
  const t = ev.target.closest('[data-id]');
  if (t) { ev.preventDefault(); navigate(t.dataset.id); }
});
document.getElementById('playerView').addEventListener('change', ev => {
  playerView = ev.target.checked;
  if (playerView && current && E[current]?.deleted) current = null;
  renderTree(); renderPage();
});
window.addEventListener('hashchange', () => { const id = location.hash.slice(1); if (E[id]) navigate(id); });
if (E[location.hash.slice(1)]) current = location.hash.slice(1);
renderTree(); renderPage();
</script>
</body>
</html>
