<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Everdeep world editor — Vessia</title>
<style>
  :root { --bg:#14171d; --panel:#1c2129; --line:#333b48; --ink:#e8e4d8; --dim:#9aa3b2;
          --gold:#ffd479; --link:#8fb8e8; --secret:#c98a8a; --ok:#8fc98a; }
  * { box-sizing:border-box; }
  body { margin:0; height:100vh; display:flex; flex-direction:column; background:var(--bg);
         color:var(--ink); font:15px/1.55 Georgia, 'Times New Roman', serif; }
  header { display:flex; align-items:center; gap:12px; padding:8px 14px; background:var(--panel);
           border-bottom:1px solid var(--line); font-family:system-ui, sans-serif; flex-wrap:wrap; }
  header h1 { font-size:15px; margin:0; }
  header .sub { color:var(--dim); font-size:12px; }
  header .grow { flex:1; }
  header label { font-size:13px; display:flex; gap:6px; align-items:center; cursor:pointer; }
  button { background:#252c37; color:var(--ink); border:1px solid var(--line); border-radius:7px;
           padding:5px 11px; font:13px system-ui, sans-serif; cursor:pointer; }
  button:hover { background:#2c3542; }
  button.small { padding:2px 8px; font-size:12px; }
  button.ghosty { border-style:dashed; color:var(--dim); }
  main { flex:1; display:flex; min-height:0; }
  nav { width:270px; overflow:auto; background:var(--panel); border-right:1px solid var(--line);
        padding:10px 8px; font-family:system-ui, sans-serif; font-size:13.5px; display:flex; flex-direction:column; }
  nav .treewrap { flex:1; }
  nav .node { padding:2px 6px; border-radius:5px; cursor:pointer; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  nav .node:hover { background:#252c37; }
  nav .node.active { background:#2c3542; color:var(--gold); }
  nav .kids { margin-left:14px; border-left:1px solid var(--line); padding-left:6px; }
  nav .dead { color:var(--dim); text-decoration:line-through; }
  nav .addroot { margin-top:10px; border-top:1px solid var(--line); padding-top:10px; }
  article { flex:1; overflow:auto; padding:26px 40px 90px; max-width:880px; }
  .crumbs { font-family:system-ui, sans-serif; font-size:12.5px; color:var(--dim); margin-bottom:6px; }
  .crumbs a { color:var(--dim); }
  .kindchip { font-family:system-ui, sans-serif; font-size:11px; text-transform:uppercase; letter-spacing:.08em;
              color:var(--gold); border:1px solid #55492c; border-radius:10px; padding:1px 9px; vertical-align:6px; margin-left:10px; }
  h2.title { font-size:30px; margin:2px 0 2px; color:var(--gold); font-weight:normal; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  h2.title input { font:inherit; color:inherit; background:#252c37; border:1px solid var(--line); border-radius:6px; padding:0 8px; max-width:60%; }
  .aliases { color:var(--dim); font-style:italic; margin-bottom:10px; }
  .tags span { font-family:system-ui,sans-serif; font-size:11px; background:#252c37; border-radius:9px; padding:1px 8px; margin-right:5px; color:var(--dim); }
  section { margin-top:22px; }
  section > h3 { font-family:system-ui, sans-serif; font-size:12px; text-transform:uppercase; letter-spacing:.1em;
                 color:var(--dim); border-bottom:1px solid var(--line); padding-bottom:4px; display:flex; align-items:center; gap:10px; }
  section > h3 .sp { flex:1; }
  .frow { display:grid; grid-template-columns:230px 1fr; gap:4px 16px; align-items:start; margin:7px 0; }
  .frow .fl { color:var(--dim); font-family:system-ui,sans-serif; font-size:13px; padding-top:5px; }
  .frow input, .frow select, .frow textarea, .blockedit textarea {
    width:100%; font:14px/1.5 Georgia, serif; color:var(--ink); background:#20262f;
    border:1px solid var(--line); border-radius:6px; padding:5px 9px; }
  .frow textarea { min-height:56px; resize:vertical; }
  a { color:var(--link); text-decoration:none; border-bottom:1px dotted #4a6584; }
  a:hover { border-bottom-style:solid; }
  .block { margin:10px 0; position:relative; }
  .block .btools { position:absolute; right:0; top:-4px; display:none; gap:4px; }
  .block:hover .btools { display:flex; }
  .block .label { font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em; }
  .block.secret { border-left:3px solid var(--secret); padding:6px 12px 6px 12px; background:#241c1c; border-radius:0 6px 6px 0; }
  .block.secret .label { color:var(--secret); }
  .blockedit textarea { min-height:90px; }
  .blockedit .rowtools { display:flex; gap:6px; margin-top:6px; align-items:center; font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); }
  .blockedit select { max-width:220px; background:#20262f; color:var(--ink); border:1px solid var(--line); border-radius:6px; padding:3px 6px; font:12px system-ui,sans-serif; }
  .statb { border:1px solid #55492c; border-radius:6px; padding:10px 14px; background:#1e1a12; }
  .statb .sbname { color:var(--gold); font-variant:small-caps; font-size:18px; }
  ul.rel, ul.backs { padding-left:18px; margin:8px 0; }
  .ghostnote { font-family:system-ui,sans-serif; font-size:12.5px; color:var(--dim); font-style:italic; }
  .provenance { font-family:ui-monospace, monospace; font-size:11.5px; color:#6b7686; margin-top:26px;
                border-top:1px dashed var(--line); padding-top:8px; }
  canvas.floor { background:#101216; border:1px solid var(--line); border-radius:4px; margin:6px 10px 6px 0; }
  .floors { display:flex; flex-wrap:wrap; align-items:flex-start; }
  .floorbox { font-family:system-ui,sans-serif; font-size:12px; color:var(--dim); }
  .conflict { font-family:system-ui,sans-serif; font-size:12.5px; color:#d8b46a; background:#242015;
              border:1px solid #55492c; border-radius:6px; padding:8px 12px; margin-top:10px; }
  .addkinds { display:flex; flex-wrap:wrap; gap:7px; margin-top:8px; }
  .newform { display:flex; gap:8px; margin-top:10px; align-items:center; font-family:system-ui,sans-serif; }
  .newform input { flex:1; max-width:340px; font:14px Georgia,serif; color:var(--ink); background:#20262f; border:1px solid var(--line); border-radius:6px; padding:6px 9px; }
  .saved { color:var(--ok); font-family:system-ui,sans-serif; font-size:12px; opacity:0; transition:opacity .3s; }
  .saved.show { opacity:1; }
  .playerhide { display:none !important; }
  @media (max-width: 720px) {
    nav { width:170px; } article { padding:18px 16px 90px; }
    .frow { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<header>
  <h1>Everdeep world editor</h1>
  <span class="sub">changes save in this browser (localStorage)</span>
  <span class="saved" id="saved">saved</span>
  <span class="grow"></span>
  <label><input type="checkbox" id="playerView"> Player View</label>
  <button id="exportBtn">Export JSON</button>
  <button id="resetBtn">Reset to fixture</button>
</header>
<main>
  <nav>
    <div class="treewrap" id="tree"></div>
    <div class="addroot">
      <button id="addRootBtn" class="ghosty">+ Add at top level</button>
    </div>
  </nav>
  <article id="page"></article>
</main>

<script>
'use strict';
const FIXTURE = /*__WORLD__*/null;
const REGISTRY = /*__REGISTRY__*/null;

const LS_KEY = 'everdeep:labs:world:v1';
let WORLD;
try {
  const stored = JSON.parse(localStorage.getItem(LS_KEY) ?? 'null');
  WORLD = stored && stored.schemaVersion === FIXTURE.schemaVersion ? stored : structuredClone(FIXTURE);
} catch { WORLD = structuredClone(FIXTURE); }

const byKind = Object.fromEntries(REGISTRY.kinds.map(k => [k.id, k]));
const E = () => WORLD.entities;
let current = null, playerView = false, editingBlock = null, addingKind = null;

let saveT = 0;
function save() {
  clearTimeout(saveT);
  saveT = setTimeout(() => {
    localStorage.setItem(LS_KEY, JSON.stringify(WORLD));
    const el = document.getElementById('saved');
    el.classList.add('show'); setTimeout(() => el.classList.remove('show'), 900);
  }, 250);
}
const now = () => new Date().toISOString();
function touch(e) { e.rev = (e.rev ?? 0) + 1; e.updated = now(); WORLD.rev++; WORLD.updated = now(); save(); }
const rid = p => p + Array.from({ length: 14 }, () => '0123456789abcdefghijklmnopqrstuvwxyz'[Math.floor(Math.random() * 36)]).join('');

// ---------- derived ----------
function childrenOf(id) {
  return Object.values(E()).filter(e => (e.parentId ?? '__root__') === id);
}
const mentionRe = /\{@e (e_[a-z0-9]{14})(?:\|([^}]*))?\}/g;
function backlinksTo(target) {
  const out = [];
  for (const e of Object.values(E())) {
    if (e.id === target) continue;
    let hit = (e.relations ?? []).some(r => r.target === target) ||
      Object.values(e.fields ?? {}).some(v => v && typeof v === 'object' && v.ref === target);
    if (!hit) for (const b of e.body ?? []) if (String(b.text ?? '').includes(target)) { hit = true; break; }
    if (hit) out.push(e.id);
  }
  return out;
}
const icon = e => byKind[e.kind]?.icon ?? '▪️';
const esc = s => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;');
const link = (id, label) => E()[id]
  ? `<a href="#${id}" data-id="${id}">${esc(label ?? E()[id].name)}</a>` : esc(label ?? id);
const renderText = t => esc(t).replace(mentionRe, (_, id, label) => link(id, label));

// ---------- tree ----------
function renderTree() {
  const nav = document.getElementById('tree');
  const item = id => {
    const e = E()[id];
    if (e.deleted && playerView) return '';
    const cls = ['node', id === current ? 'active' : '', e.deleted ? 'dead' : ''].join(' ');
    let html = `<div class="${cls}" data-id="${id}">${icon(e)} ${esc(e.name)}</div>`;
    const c = childrenOf(id).filter(k => !(k.deleted && playerView));
    if (c.length) html += `<div class="kids">${c.map(k => item(k.id)).join('')}</div>`;
    return html;
  };
  nav.innerHTML = childrenOf('__root__').map(e => item(e.id)).join('');
}

// ---------- sites (read-only rendering) ----------
function sitesFor(id) {
  const out = [];
  for (const p of WORLD.planes ?? []) for (const s of p.sites ?? []) if (s.entityId === id) out.push(s);
  return out;
}
function drawFloor(canvas, floor) {
  const cs = Math.max(3, Math.min(10, Math.floor(300 / Math.max(floor.w, floor.h))));
  canvas.width = floor.w * cs + 1; canvas.height = floor.h * cs + 1;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#232833'; ctx.lineWidth = 1;
  for (let x = 0; x <= floor.w; x++) { ctx.beginPath(); ctx.moveTo(x*cs+.5, 0); ctx.lineTo(x*cs+.5, floor.h*cs); ctx.stroke(); }
  for (let y = 0; y <= floor.h; y++) { ctx.beginPath(); ctx.moveTo(0, y*cs+.5); ctx.lineTo(floor.w*cs, y*cs+.5); ctx.stroke(); }
  const colors = { floor:'#b7a98c', wall:'#4a4436', door:'#c98a3f', stairs:'#8fb8e8', water:'#2c4a6b', hazard:'#c96a6a' };
  for (const [addr, cell] of Object.entries(floor.cells ?? {})) {
    const [x, y] = addr.split(',').map(Number);
    ctx.fillStyle = colors[cell.t] ?? '#b7a98c';
    ctx.fillRect(x*cs+1, y*cs+1, cs-1, cs-1);
    if (cell.entityId) { ctx.strokeStyle = '#ffd479'; ctx.lineWidth = 2; ctx.strokeRect(x*cs+1.5, y*cs+1.5, cs-2, cs-2); }
  }
}

// ---------- fields ----------
function fieldRow(e, def, key) {
  const v = e.fields?.[key];
  const label = def?.label ?? key;
  if (playerView) {
    if (v === undefined || v === '') return '';
    const shown = v && typeof v === 'object' && v.ref ? link(v.ref)
      : v && typeof v === 'object' && v.date ? esc(v.date)
      : Array.isArray(v) ? esc(v.join(', ')) : renderText(v);
    return `<div class="frow"><div class="fl">${esc(label)}</div><div>${shown}</div></div>`;
  }
  const type = def?.type ?? (typeof v === 'number' ? 'number' : 'text');
  let control;
  if (type === 'entityRef') {
    const opts = Object.values(E()).filter(x => !x.deleted && (!def?.refKind || x.kind === def.refKind))
      .map(x => `<option value="${x.id}" ${v?.ref === x.id ? 'selected' : ''}>${esc(x.name)}</option>`).join('');
    control = `<select data-fkey="${key}" data-ftype="entityRef"><option value="">—</option>${opts}</select>`;
  } else if (type === 'longtext') {
    control = `<textarea data-fkey="${key}" data-ftype="longtext" placeholder="…">${esc(v ?? '')}</textarea>`;
  } else if (type === 'number') {
    control = `<input type="number" data-fkey="${key}" data-ftype="number" value="${v ?? ''}">`;
  } else {
    const shown = v && typeof v === 'object' && v.date ? v.date : Array.isArray(v) ? v.join(', ') : (v ?? '');
    control = `<input data-fkey="${key}" data-ftype="${type}" value="${esc(shown)}" placeholder="…">`;
  }
  return `<div class="frow"><div class="fl">${esc(label)}</div><div>${control}</div></div>`;
}

// ---------- page ----------
function entityOptions(exclude) {
  return Object.values(E()).filter(x => !x.deleted && x.id !== exclude)
    .map(x => `<option value="${x.id}">${icon(x)} ${esc(x.name)}</option>`).join('');
}
function renderPage() {
  const art = document.getElementById('page');
  const ents = E();
  if (!current || !ents[current]) {
    art.innerHTML = `<h2 class="title">Vessia</h2>
      <p>This is the Phase 0 fixture world, now <b>editable</b>: pick a page from the tree, then rename it,
      fill in its fields (the labels are prompts), write in its entry, and add new pages inside it with
      the kind buttons at the bottom of each page. Blue links are live cross-references; every page shows
      what links back to it. Your changes persist in this browser — use <b>Export JSON</b> to take them out,
      or <b>Reset to fixture</b> to start over.</p>
      <p class="ghostnote">Not in this prototype (comes with the real engine): generated suggestions
      (ghosts), the map, search, and undo. The point here is the feel of building a linked world by hand.</p>`;
    return;
  }
  const e = ents[current];
  const kind = byKind[e.kind] ?? { childKinds: [], suggestedFields: [] };
  const chain = []; let p = e.parentId;
  while (p && ents[p]) { chain.unshift(link(p)); p = ents[p].parentId; }
  let html = `<div class="crumbs">${chain.length ? chain.join(' › ') + ' ›' : 'Vessia'}</div>`;
  html += `<h2 class="title"><span>${icon(e)}</span><span id="nameSpan">${esc(e.name)}</span>` +
    `<span class="kindchip">${e.kind}${e.deleted ? ' · deleted' : ''}</span>` +
    (playerView ? '' : `<button class="small" id="renameBtn" title="rename">✏️</button>`) + `</h2>`;
  if (e.aliases?.length) html += `<div class="aliases">also called ${e.aliases.map(esc).join(', ')}</div>`;
  if (e.tags?.length) html += `<div class="tags">${e.tags.map(t => `<span>${esc(t)}</span>`).join('')}</div>`;

  // fields: suggested first (prompt labels teach), then any extra keys
  const sugg = kind.suggestedFields ?? [];
  const extraKeys = Object.keys(e.fields ?? {}).filter(k => !sugg.some(s => s.key === k));
  const rows = sugg.map(d => fieldRow(e, d, d.key)).join('') + extraKeys.map(k => fieldRow(e, null, k)).join('');
  if (rows.trim() || !playerView) {
    html += `<section><h3>Details<span class="sp"></span>${playerView ? '' : '<button class="small" id="addFieldBtn">+ field</button>'}</h3>${rows}</section>`;
  }

  // body
  html += `<section><h3>Entry<span class="sp"></span>${playerView ? '' : '<button class="small" id="addParaBtn">+ paragraph</button>'}</h3>`;
  for (const b of e.body ?? []) {
    const secret = (e.secretBlocks ?? []).includes(b.id);
    if (secret && playerView) continue;
    const cls = `block${secret ? ' secret' : ''}`;
    if (editingBlock === b.id && !playerView) {
      html += `<div class="${cls} blockedit" data-bid="${b.id}">
        <textarea id="blockTa">${esc(b.text ?? '')}</textarea>
        <div class="rowtools">
          <select id="linkSel"><option value="">insert link to…</option>${entityOptions(e.id)}</select>
          <button class="small" id="blockSave">Save</button>
          <button class="small" id="blockCancel">Cancel</button>
          <span>links are typed as {@e id|text}</span>
        </div></div>`;
      continue;
    }
    const tools = playerView ? '' : `<span class="btools">
      <button class="small" data-edit="${b.id}">✏️</button>
      <button class="small" data-secret="${b.id}" title="toggle secret">${secret ? '🔓' : '🔒'}</button>
      <button class="small" data-delblock="${b.id}">✕</button></span>`;
    if (b.type === 'statblock') { html += `<div class="${cls}">${tools}<div class="statb"><div class="sbname">${esc(b.name ?? '')}</div></div></div>`; continue; }
    const label = b.label ?? (secret ? 'Secret' : '');
    html += `<div class="${cls}">${tools}${label ? `<div class="label">${esc(label)}</div>` : ''}${renderText(b.text ?? '')}</div>`;
  }
  if (!(e.body ?? []).length) html += `<div class="ghostnote">Nothing written yet.</div>`;
  html += `</section>`;

  if (e.relations?.length) {
    html += `<section><h3>Relations</h3><ul class="rel">` +
      e.relations.map(r => `<li>${esc(r.type)} → ${link(r.target)}</li>`).join('') + `</ul></section>`;
  }
  const backs = backlinksTo(current);
  if (backs.length) {
    html += `<section><h3>Referenced by</h3><ul class="backs">` +
      backs.map(id => `<li>${icon(ents[id])} ${link(id)}</li>`).join('') + `</ul></section>`;
  }
  const sites = sitesFor(current);
  if (sites.length) {
    html += `<section><h3>Site maps</h3><div class="floors">` +
      sites.flatMap(site => site.floors.map((f, i) =>
        `<div class="floorbox"><canvas class="floor" data-site="${site.id}" data-floor="${i}"></canvas>
         <div>${esc(f.label)} — ${f.w}×${f.h} @ ${site.cellFt} ft${Object.values(f.cells ?? {}).some(c => c.entityId)
           ? ' · ' + Object.values(f.cells).filter(c => c.entityId).map(c => link(c.entityId)).join(', ') + ' placed here' : ''}</div></div>`
      )).join('') + `</div></section>`;
  }

  // add-inside
  if (!playerView && !e.deleted) {
    const kinds = (kind.childKinds ?? []).map(k =>
      `<button data-addkind="${k}">${byKind[k]?.icon ?? ''} ${esc(byKind[k]?.label ?? k)}</button>`).join('');
    html += `<section><h3>Add inside ${esc(e.name)}</h3><div class="addkinds">${kinds || '<span class="ghostnote">this kind holds nothing</span>'}</div>`;
    if (addingKind) {
      html += `<div class="newform">${byKind[addingKind]?.icon ?? ''}
        <input id="newName" placeholder="Name the new ${esc(byKind[addingKind]?.label ?? addingKind)}…">
        <button id="createBtn">Create</button><button id="cancelAdd" class="small">✕</button></div>`;
    }
    html += `<div class="ghostnote" style="margin-top:8px">In the full app, generated suggestions (ghosts) appear here too — keep, reroll, or dismiss.</div></section>`;
  }

  if (!playerView && e.gen) {
    html += `<div class="provenance">generated by ${esc(e.gen.generator)}` +
      `${e.gen.role ? ` · role “${esc(e.gen.role)}” of ${esc(e.gen.plan)}` : ''}<br>seed ${esc(e.gen.seed)}` +
      `${e.gen.overrides?.length ? `<br>kept by hand: ${esc(e.gen.overrides.join(', '))}` : ''}</div>`;
  }
  if (!playerView) {
    for (const c of (WORLD.conflicts ?? []).filter(c => c.entityId === current))
      html += `<div class="conflict">⚠ sync conflict inbox: a copy of this page lost a merge at ${esc(c.at)} — kept for review, never silently dropped.</div>`;
    html += `<div style="margin-top:18px">${e.deleted
      ? `<button id="restoreBtn">Restore this page</button>`
      : `<button id="deleteBtn">Delete this page</button>`}</div>`;
  }
  art.innerHTML = html;
  art.querySelectorAll('canvas.floor').forEach(cv => {
    const site = WORLD.planes.flatMap(p => p.sites ?? []).find(s => s.id === cv.dataset.site);
    drawFloor(cv, site.floors[Number(cv.dataset.floor)]);
  });
  wirePage(e, kind, sugg);
}

// ---------- wiring ----------
function wirePage(e, kind, sugg) {
  const $ = id => document.getElementById(id);
  $('renameBtn')?.addEventListener('click', () => {
    const span = $('nameSpan');
    span.innerHTML = `<input id="nameInput" value="${esc(e.name)}">`;
    const inp = $('nameInput'); inp.focus(); inp.select();
    const commit = () => { const v = inp.value.trim(); if (v) { e.name = v; touch(e); } rerender(); };
    inp.addEventListener('keydown', ev => { if (ev.key === 'Enter') commit(); if (ev.key === 'Escape') rerender(); });
    inp.addEventListener('blur', commit);
  });
  document.querySelectorAll('[data-fkey]').forEach(ctl => {
    ctl.addEventListener('change', () => {
      const key = ctl.dataset.fkey, type = ctl.dataset.ftype;
      e.fields ??= {};
      if (type === 'entityRef') { if (ctl.value) e.fields[key] = { ref: ctl.value }; else delete e.fields[key]; }
      else if (type === 'number') { if (ctl.value === '') delete e.fields[key]; else e.fields[key] = Number(ctl.value); }
      else if (type === 'date') { if (ctl.value) e.fields[key] = { date: ctl.value }; else delete e.fields[key]; }
      else { if (ctl.value.trim() === '') delete e.fields[key]; else e.fields[key] = ctl.value; }
      touch(e);
      if (type === 'entityRef') rerender();
    });
  });
  $('addFieldBtn')?.addEventListener('click', () => {
    const key = prompt('Field name (letters/numbers, e.g. "banner"):');
    if (!key || !/^[a-z][a-zA-Z0-9]*$/.test(key)) return alert('Use a lowercase-first alphanumeric key.');
    e.fields ??= {}; e.fields[key] ??= ''; touch(e); rerender();
  });
  $('addParaBtn')?.addEventListener('click', () => {
    e.body ??= [];
    const b = { type: 'paragraph', id: 'b_' + rid('').slice(0, 8), text: '' };
    e.body.push(b); editingBlock = b.id; touch(e); rerender();
  });
  document.querySelectorAll('[data-edit]').forEach(btn =>
    btn.addEventListener('click', () => { editingBlock = btn.dataset.edit; rerender(); }));
  document.querySelectorAll('[data-delblock]').forEach(btn =>
    btn.addEventListener('click', () => {
      e.body = (e.body ?? []).filter(b => b.id !== btn.dataset.delblock);
      e.secretBlocks = (e.secretBlocks ?? []).filter(id => id !== btn.dataset.delblock);
      touch(e); rerender();
    }));
  document.querySelectorAll('[data-secret]').forEach(btn =>
    btn.addEventListener('click', () => {
      const id = btn.dataset.secret;
      e.secretBlocks ??= [];
      e.secretBlocks = e.secretBlocks.includes(id) ? e.secretBlocks.filter(x => x !== id) : [...e.secretBlocks, id];
      touch(e); rerender();
    }));
  const ta = $('blockTa');
  if (ta) {
    $('linkSel')?.addEventListener('change', ev => {
      const id = ev.target.value; if (!id) return;
      const ins = `{@e ${id}|${E()[id].name}}`;
      const s = ta.selectionStart ?? ta.value.length;
      ta.value = ta.value.slice(0, s) + ins + ta.value.slice(ta.selectionEnd ?? s);
      ev.target.value = ''; ta.focus();
    });
    $('blockSave')?.addEventListener('click', () => {
      const b = (e.body ?? []).find(b => b.id === editingBlock);
      if (b) { b.text = ta.value; touch(e); }
      editingBlock = null; rerender();
    });
    $('blockCancel')?.addEventListener('click', () => { editingBlock = null; rerender(); });
    ta.focus();
  }
  document.querySelectorAll('[data-addkind]').forEach(btn =>
    btn.addEventListener('click', () => { addingKind = btn.dataset.addkind; rerender(); setTimeout(() => $('newName')?.focus(), 0); }));
  $('cancelAdd')?.addEventListener('click', () => { addingKind = null; rerender(); });
  const create = () => {
    const name = $('newName')?.value.trim();
    if (!name || !addingKind) return;
    const ne = { id: rid('e_'), kind: addingKind, name, parentId: e.id, fields: {}, body: [],
                 rev: 1, created: now(), updated: now() };
    E()[ne.id] = ne; WORLD.rev++; WORLD.updated = now(); save();
    addingKind = null; navigate(ne.id);
  };
  $('createBtn')?.addEventListener('click', create);
  $('newName')?.addEventListener('keydown', ev => { if (ev.key === 'Enter') create(); });
  $('deleteBtn')?.addEventListener('click', () => {
    if (!confirm(`Delete “${e.name}”? (It becomes a tombstone; children are kept.)`)) return;
    e.deleted = now(); touch(e); rerender();
  });
  $('restoreBtn')?.addEventListener('click', () => { delete e.deleted; touch(e); rerender(); });
}

// ---------- shell ----------
function rerender() { renderTree(); renderPage(); }
function navigate(id) { current = id; editingBlock = null; addingKind = null; rerender(); }
document.addEventListener('click', ev => {
  const t = ev.target.closest('a[data-id], .node[data-id]');
  if (t) { ev.preventDefault(); navigate(t.dataset.id); }
});
document.getElementById('playerView').addEventListener('change', ev => {
  playerView = ev.target.checked;
  editingBlock = null; addingKind = null;
  if (playerView && current && E()[current]?.deleted) current = null;
  rerender();
});
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(WORLD, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = (WORLD.name || 'world') + '.json'; a.click();
  URL.revokeObjectURL(a.href);
});
document.getElementById('resetBtn').addEventListener('click', () => {
  if (!confirm('Discard all your changes and restore the original fixture world?')) return;
  localStorage.removeItem(LS_KEY); location.hash = ''; location.reload();
});
document.getElementById('addRootBtn').addEventListener('click', () => {
  const name = prompt('Name the new top-level region:');
  if (!name?.trim()) return;
  const ne = { id: rid('e_'), kind: 'region', name: name.trim(), fields: {}, body: [],
               rev: 1, created: now(), updated: now() };
  E()[ne.id] = ne; WORLD.rev++; WORLD.updated = now(); save();
  navigate(ne.id);
});
window.addEventListener('hashchange', () => { const id = location.hash.slice(1); if (E()[id]) navigate(id); });
if (E()[location.hash.slice(1)]) current = location.hash.slice(1);
rerender();
</script>
</body>
